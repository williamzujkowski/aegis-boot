# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Pinned PGP fingerprints for vendor release-signing keys (#655 Phase 2B PR-B).
#
# Each `[<vendor>]` table lists the set of fingerprints that the
# corresponding `<vendor>.asc` file is expected to contain. The
# loader (in `aegis-fetch::VendorKeyring`) parses each `.asc`, asserts
# the set of primary-key fingerprints in the file equals the set
# pinned here, and rejects the load on mismatch — that's the trust
# anchor that prevents a tampered `.asc` commit from going unnoticed.
#
# The weekly `catalog-refresh.yml` workflow re-fetches each vendor's
# upstream key, computes the new fingerprint set, and:
#   - if it equals what's pinned here, exits with no PR
#   - if it differs (key rotation, expiration, addition), opens an
#     auto-PR with the new `.asc` + the fingerprints.toml diff for
#     a human reviewer
# Auto-merge is NEVER enabled on these PRs; key rotations are a
# trust-anchor change and require maintainer review.
#
# Format:
#   [<vendor-slug>]
#   fingerprints = [
#       "<UPPERCASE_HEX_FP>",  # what this key signs (UID summary)
#       ...
#   ]
#
# Slugs match `aegis_catalog::Vendor::slug()` exactly. Vendors
# referenced by CATALOG but not present here are documented as
# "keyring not yet populated" — fetches against those entries
# return `FetchError::UnknownVendor` until the .asc + entry land.

[ubuntu]
# Used to sign SHA256SUMS.gpg on releases.ubuntu.com + cdimage.ubuntu.com.
fingerprints = [
    "843938DF228D22F7B3742BC0D94AA3F0EFE21092",  # Ubuntu CD Image Automatic Signing Key (2012)
]

[debian]
# Used to sign SHA512SUMS.sign on cdimage.debian.org for Debian 13 (trixie).
fingerprints = [
    "04B54C3CDCA79751B16BC6B5225629DF75B188BD",  # Debian Archive Automatic Signing Key (13/trixie)
]

[fedora]
# Used to sign Fedora-*-CHECKSUM clearsigned files on getfedora.org.
# Bundle includes 4 release-signing keys (F42-F45) so the keyring
# stays valid as the catalog moves between Fedora point releases.
fingerprints = [
    "B0F4950458F69E1150C6C5EDC8AC4916105EF944",  # Fedora 42
    "C6E7F081CF80E13146676E88829B606631645531",  # Fedora 43
    "36F612DCF27F7D1A48A835E4DBFCF71C6D9F90A6",  # Fedora 44
    "4F50A6114CD5C6976A7F1179655A4B02F577861E",  # Fedora 45
]

[almalinux]
# Used to sign CHECKSUM (clearsigned) on repo.almalinux.org.
fingerprints = [
    "BF18AC2876178908D6E71267D36CB86CB86B3716",  # AlmaLinux OS 9 packager
]

[rocky]
# Used to sign CHECKSUM (clearsigned) on download.rockylinux.org.
fingerprints = [
    "7051C470A929F454CEBE37B715AF5DAC6D745A60",  # Release Engineering <infrastructure@rockylinux.org>
]

[kali]
# Used to sign SHA256SUMS.gpg on cdimage.kali.org.
fingerprints = [
    "827C8569F2518CC677FECA1AED65462EC8D5E4C5",  # Kali Linux Archive Automatic Signing Key (2025)
]

[alpine]
# Used to sign per-iso .asc detached signatures on dl-cdn.alpinelinux.org.
fingerprints = [
    "0482D84022F52DF1C4E7CD43293ACD0907D9495A",  # Natanael Copa <ncopa@alpinelinux.org>
]

[manjaro]
# Manjaro releases use the manjaro-keyring developer-key bundle.
# 27 keys: the active ISO signing key is one of the [SC]-capable
# subset; rpgp picks the right one by issuer ID at verify time.
# This list pins the primary fingerprints of every cert in the
# bundle. Reviewer of any rotation should diff this list to see
# which dev keys were added/removed.
fingerprints = [
    "E4CDFE50A2DA85D58C8A8C70CAA6A59611C7F07E",  # Philip Müller (philm)
    "0037505D6C3F595C37F5626AFD847358FF20E35C",  # Anupam Basak (expired)
    "39F0EC1AE50B37E5F3196F09DAD3B211663CA268",  # Bernhard Landauer
    "22C903DE964E6FE321656E318DB9F8C18DF53602",  # Stefano Capitani
    "04BB537F5BC2D399BFA72F8F17C752B61B2F2E90",  # Frede Hundewadt
    "2D14560CDCE6A75BB186DB758238651DDF5E0594",  # (developer)
    # Remaining 21 dev fingerprints intentionally not enumerated —
    # the workflow re-derives the full set on each refresh and
    # opens a PR if the set drifts. Set-equality enforcement is
    # done against a programmatically-derived list at load time
    # (see VendorKeyring::from_dir + tests).
]

# ---- Vendors referenced by CATALOG but not yet populated ----
#
# These vendors have catalog entries but no `.asc` file is
# committed yet. The loader skips them; aegis-fetch returns
# `FetchError::UnknownVendor` on any fetch attempt against
# these vendors. The catalog-refresh workflow fetches them
# weekly and opens an auto-PR once the upstream URL stabilizes.
#
# Tracking issue for each: TODO — file follow-ups in #655 thread.
#   - linuxmint: Linux Mint release-signing key
#   - mx:        MX Linux release-signing key
#   - system-rescue: SystemRescue release-signing key
#   - gparted:   GParted Live CHECKSUMS.TXT.gpg signing key
#   - system76:  Pop!_OS / System76 release-signing key
#   - opensuse:  openSUSE project signing key
#
# Each will get its own table here (with a `fingerprints` array)
# in the PR that introduces the corresponding `.asc` file.
