# SPDX-License-Identifier: MIT OR Apache-2.0
#
# Typos config for aegis-boot (#485 supply-chain hygiene bundle).
#
# Every entry in this file is a false-positive the default dictionary
# flags. Real typos are fixed in-source — this file only carries
# exemptions that have a specific product/technical motivation.

# Extend the default dictionary with project-specific words that are
# NOT typos. Each entry maps the flagged token → itself so typos
# passes it through unchanged. Both sides are identical because the
# tokens are already correct.
[default.extend-words]
# Crate names
ratatui = "ratatui"
# Product / vendor names
Cruzer = "Cruzer"    # SanDisk USB stick product line (#132 hardware gate)
Insyde = "Insyde"    # Insyde Software — BIOS/UEFI firmware vendor
INSYDE = "INSYDE"    # Same, as it appears in DMI firmware strings
# "mis-" prefix in compound words (mis-count, mis-strip) tokenizes to
# standalone "mis" when the hyphen splits the word boundary. Rust
# style + prose both use this form; not actually a typo.
mis = "mis"

# Substrings typos flags as part of a longer correct word. These
# aren't standalone typos — they appear inside legitimate identifiers
# (PNG → "PN", SHAKE → "AKE", NAMEs → "NAM").
[default.extend-identifiers]
# GUID fragments for the EFI System Partition
# (c12a7328-f81f-11d2-ba4b-00a0c93ec93b): `ba4b` triggers a `ba → by/be`
# flag on pure-substring matching.
ba4b = "ba4b"
# Hex prefixes / fragments used in aegis-fetch verify tests
# (#655 Phase 2B). `ba7816bf` is the canonical SHA-256("abc") test
# vector; `ba78`/`ba79` are synthetic single-digit-flipped fragments
# the tamper tests use to invalidate a signed hash.
ba7816bf = "ba7816bf"
ba78 = "ba78"
ba79 = "ba79"
# Synthetic hardware serial used in init_wizard doc examples.
AKE74Z1Y00098765 = "AKE74Z1Y00098765"
# "NAMEs" abbreviated as "NAM" in a comment describing man-page sections.
NAMEs = "NAMEs"
# "PNGs" plural form — typos matches "PN" as a standalone token.
PNGs = "PNGs"
# Rust `mis-` prefix in identifiers and doc comments (mis-count,
# mis-strip). Not the word "miss" or "mist".
"mis-counts" = "mis-counts"
"mis-stripped" = "mis-stripped"
"mis-trusted" = "mis-trusted"
# French loanword "raison d'être" used in architecture prose.
raison = "raison"

# Per-path exclusions — paths where typos checking is noise or wrong.
[files]
extend-exclude = [
    # Generated artifacts. Regenerated by docgen/publish scripts; any
    # typo inside is inherited from the source doc comment, which the
    # default rules will catch at the source.
    "target/",
    "out/",
    "docs/reference/schemas/*.schema.json",
    "docs/reference/CLI_SYNOPSIS.md",
    # Binary / image formats
    "*.png",
    "*.ico",
    "*.svg",
    "*.woff2",
    "assets/fonts/",
    # Minisign signatures + sha256sums — random-looking hex is a
    # typos false-positive goldmine.
    "*.minisig",
    "*.sha256",
    "*.SHA256SUMS",
    # Vendor keyring directory (#655 PR-B).
    # `<vendor>.asc` is base64-encoded OpenPGP — random characters
    # by definition. `<vendor>.txt` is `gpg --show-keys` output —
    # space-grouped hex fingerprints (e.g. `1AFE`, `BA4B` chunks)
    # trip the dictionary on substring matches. Both are
    # cryptographic data, not prose; excluding the whole keyring
    # subtree keeps the typo gate accurate without false-positives.
    # Reviewer scrutiny of key rotations happens at PR-diff time,
    # not via the typo checker.
    # NOTE: the vendor keyring directory used to live at
    # `crates/aegis-catalog-data/keyring/` but was extracted to its
    # own repo (aegis-boot/aegis-catalog-data) in #701 Phase 2.
    # Typos config in that repo carries the equivalent exclusion.
    # Cargo lockfiles carry package names upstream decides; our typo
    # gate shouldn't second-guess them.
    "Cargo.lock",
    "flake.lock",
    # External-author fixtures embedded in tests.
    "crates/iso-parser/fuzz/corpus/",
]
