name: OVMF SecBoot

on:
  # Foundation job is cheap (~30s) and proves the OVMF firmware itself
  # boots under MS-enrolled vars. No Rust deps; markdown changes can't
  # break it. Filter still applies to keep PR check counts predictable.
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', '.github/ISSUE_TEMPLATE/**', 'LICENSE*']
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', '.github/ISSUE_TEMPLATE/**', 'LICENSE*']
  workflow_dispatch:

# Phase 1 of issue #16: validate the OVMF SecBoot environment in CI by
# launching QEMU with the MS-enrolled Ubuntu OVMF variables and asserting
# the firmware loads cleanly.
#
# The Phase 2 E2E job (signed chain → rescue-tui) used to live here as
# `ovmf-secboot-e2e`. It moved to e2e-suite.yml's `ovmf-secboot-shared`
# job in #580 Phase 2g (PR #690) and was retired from this file in
# Phase 2 retirement (PR #691). Foundation stays — it has no shared
# build deps, so it doesn't benefit from the build-shared producer.

# Top-level permissions: read-only default. Jobs that need write
# access elevate explicitly. Closes Scorecard TokenPermissionsID.
permissions:
  contents: read

jobs:
  ovmf-secboot-foundation:
    name: OVMF SecBoot foundation
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install QEMU + OVMF (with MS-enrolled vars)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 ovmf
          ls -l /usr/share/OVMF/OVMF_CODE_4M.secboot.fd \
                /usr/share/OVMF/OVMF_VARS_4M.ms.fd

      - name: Run OVMF SecBoot foundation smoke
        env:
          TIMEOUT_SECONDS: "30"
        run: ./scripts/ovmf-secboot-smoke.sh
