name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.12.0)"
        required: true

permissions:
  contents: write
  # Required for cosign keyless signing via GitHub OIDC. The token is
  # used by sigstore/cosign-installer + cosign sign-blob to fetch a
  # signing certificate bound to this workflow's identity.
  id-token: write

jobs:
  build-and-release:
    name: Build + sign + attach release artifacts
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            busybox-static cpio

      - name: Install Rust toolchain (pinned) + musl target
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain 1.85.0 --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" target add x86_64-unknown-linux-musl

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      # ---------- Operator CLI (static musl) -------------------------
      # `aegis-boot` shells out to dd / mount / sudo / sgdisk on the
      # host; static musl just makes the binary itself distro-portable
      # (no glibc version coupling). Operators still need the system
      # tools — `aegis-boot doctor` reports missing prerequisites.
      #
      # aegis-cli is pure-Rust (no C deps) so we don't need musl-gcc /
      # musl-tools — rustc handles the static linking via the rust-std
      # for the musl target. Verified locally: 855 KiB static-pie ELF.
      - name: Build aegis-boot CLI (static musl, x86_64)
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: |
          cargo build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p aegis-cli
          mkdir -p out
          cp target/x86_64-unknown-linux-musl/release/aegis-boot \
            out/aegis-boot-x86_64-linux
          file out/aegis-boot-x86_64-linux
          strip out/aegis-boot-x86_64-linux
          du -h out/aegis-boot-x86_64-linux

      # ---------- rescue-tui + initramfs (existing flow) -------------
      - name: Build rescue-tui (release)
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: cargo build --release -p rescue-tui

      - name: Build initramfs
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: ./scripts/build-initramfs.sh

      # ---------- SBOM (existing flow) -------------------------------
      - name: Generate CycloneDX SBOM
        run: |
          cargo install --locked cargo-cyclonedx --version 0.5.7
          # cargo-cyclonedx writes a `<package>.cdx.json` inside each
          # member crate directory rather than a single workspace-wide
          # file. The rescue-tui crate is what we actually ship; its
          # SBOM closure transitively covers iso-probe + kexec-loader +
          # iso-parser since those are compile-time dependencies.
          ( cd crates/rescue-tui && cargo cyclonedx --format json )
          cp crates/rescue-tui/rescue-tui.cdx.json out/sbom.cdx.json

      # ---------- Stage + checksum --------------------------------------
      - name: Stage release artifacts + aggregate SHA256SUMS
        run: |
          cp target/release/rescue-tui out/rescue-tui
          ( cd out && sha256sum \
              aegis-boot-x86_64-linux \
              rescue-tui \
              initramfs.cpio.gz \
              sbom.cdx.json \
              > SHA256SUMS )
          echo "--- Staged artifacts ---"
          ls -lh out/
          echo "--- SHA256SUMS ---"
          cat out/SHA256SUMS

      # ---------- Cosign keyless sign --------------------------------
      # Each artifact gets a .sig (signature) + .pem (certificate)
      # produced via Sigstore keyless signing. Verifiable later with:
      #   cosign verify-blob --certificate-identity-regexp \
      #     "https://github.com/williamzujkowski/aegis-boot/" \
      #     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      #     --signature aegis-boot-x86_64-linux.sig \
      #     --certificate aegis-boot-x86_64-linux.pem \
      #     aegis-boot-x86_64-linux
      - name: Cosign sign artifacts (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cd out
          for f in aegis-boot-x86_64-linux rescue-tui initramfs.cpio.gz \
                   sbom.cdx.json SHA256SUMS; do
            cosign sign-blob --yes \
              --output-signature  "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          echo "--- Signed artifacts ---"
          ls -1 *.sig *.pem

      # ---------- Release notes (existing flow) ----------------------
      - name: Generate release notes
        id: notes
        run: |
          tag="${{ steps.tag.outputs.name }}"
          # Prefer the CHANGELOG entry if present; otherwise synthesize.
          if [ -f CHANGELOG.md ] && grep -q "^## \[${tag#v}\]" CHANGELOG.md; then
            awk -v tag="${tag#v}" '
              BEGIN { inside = 0 }
              /^## \[/ {
                if (inside) exit
                if ($0 ~ "^## \\[" tag "\\]") inside = 1
                else next
              }
              inside { print }
            ' CHANGELOG.md > out/release-notes.md
          else
            echo "Release ${tag}" > out/release-notes.md
          fi
          # Append the verification footer (kept in docs/ to avoid
          # heredoc-vs-YAML indentation hazards in this workflow file).
          # Optional: older tags pre-dating the footer file just skip it.
          if [ -f docs/RELEASE_NOTES_FOOTER.md ]; then
            cat docs/RELEASE_NOTES_FOOTER.md >> out/release-notes.md
          else
            echo "(no docs/RELEASE_NOTES_FOOTER.md at this ref — skipping verification footer)" >&2
          fi
          echo "path=out/release-notes.md" >> "$GITHUB_OUTPUT"

      # ---------- Create release if missing, then upload assets ------
      # Idempotent: works whether the release already exists (manual
      # `gh release create` happened first) or not (tag push triggered
      # this workflow before any human created the release).
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.name }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "aegis-boot $tag" \
              --notes-file "${{ steps.notes.outputs.path }}"
          fi
          # --clobber overwrites if a re-run uploads the same asset name.
          gh release upload "$tag" --clobber \
            out/aegis-boot-x86_64-linux \
            out/aegis-boot-x86_64-linux.sig \
            out/aegis-boot-x86_64-linux.pem \
            out/rescue-tui \
            out/rescue-tui.sig \
            out/rescue-tui.pem \
            out/initramfs.cpio.gz \
            out/initramfs.cpio.gz.sha256 \
            out/initramfs.cpio.gz.sig \
            out/initramfs.cpio.gz.pem \
            out/sbom.cdx.json \
            out/sbom.cdx.json.sig \
            out/sbom.cdx.json.pem \
            out/SHA256SUMS \
            out/SHA256SUMS.sig \
            out/SHA256SUMS.pem

  # Bumps Formula/aegis-boot.rb on main when a new tag is pushed. Skipped
  # for workflow_dispatch (which is the manual-backfill path — bumping
  # would risk regressing the formula to an older release).
  bump-brew-formula:
    name: Bump Homebrew formula on main
    needs: build-and-release
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          # Token with write — the default GITHUB_TOKEN suffices because
          # we set `permissions: contents: write` above.

      - name: Resolve tag
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Wait briefly for release assets to settle
        # gh release upload above can lag a few seconds before the API
        # returns assets via `gh release download`. Tiny sleep avoids
        # the race in practice.
        run: sleep 10

      - name: Download SHA256SUMS from the new release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.name }}"
          gh release download "$tag" --pattern SHA256SUMS --output /tmp/SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat /tmp/SHA256SUMS

      - name: Bump Formula/aegis-boot.rb if needed
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.name }}"
          version="${tag#v}"
          new_sha=$(grep '  aegis-boot-x86_64-linux$' /tmp/SHA256SUMS | awk '{print $1}')
          if [ -z "$new_sha" ]; then
            echo "no aegis-boot-x86_64-linux row in SHA256SUMS — aborting bump" >&2
            exit 1
          fi
          echo "new version: $version"
          echo "new sha256:  $new_sha"

          if [ ! -f Formula/aegis-boot.rb ]; then
            echo "Formula/aegis-boot.rb missing — nothing to bump" >&2
            exit 0
          fi

          # Idempotent edits via sed. The formula's three pinned values:
          #   version "X.Y.Z"
          #   url "https://github.com/.../v X.Y.Z /aegis-boot-x86_64-linux"
          #   sha256 "..."
          sed -i \
            -e "s|^  version \".*\"|  version \"${version}\"|" \
            -e "s|/releases/download/v[^/]*/aegis-boot-x86_64-linux\"|/releases/download/v${version}/aegis-boot-x86_64-linux\"|" \
            -e "s|^      sha256 \"[a-f0-9]*\"|      sha256 \"${new_sha}\"|" \
            Formula/aegis-boot.rb

          # Show the diff for the run log.
          echo "--- formula diff ---"
          git --no-pager diff Formula/aegis-boot.rb || true

          if git diff --quiet Formula/aegis-boot.rb; then
            echo "formula already up to date for ${tag} — skipping commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push the bump
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.name }}"
          git config user.name "aegis-boot release bot"
          git config user.email "noreply@github.com"
          git add Formula/aegis-boot.rb
          # Heredoc-built message keeps the multi-line body cleanly
          # indented inside the YAML literal block scalar.
          msg_file=$(mktemp)
          {
            printf 'chore(brew): bump formula to %s\n' "$tag"
            printf '\n'
            printf 'Auto-bump from .github/workflows/release.yml after the %s\n' "$tag"
            printf 'release artifacts were uploaded. SHA-256 sourced from the\n'
            printf "release's signed SHA256SUMS file.\n"
          } > "$msg_file"
          git commit --file="$msg_file"
          git push origin main
