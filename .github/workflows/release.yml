name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.12.0)"
        required: true

permissions:
  contents: write
  # Required for cosign keyless signing via GitHub OIDC. The token is
  # used by sigstore/cosign-installer + cosign sign-blob to fetch a
  # signing certificate bound to this workflow's identity.
  id-token: write

jobs:
  build-and-release:
    name: Build + sign + attach release artifacts
    runs-on: ubuntu-22.04
    # Bumped from 25 → 30 (#235 PR2): the mkusb.sh image build adds
    # ~3-5 min for the signed shim+grub+kernel staging + initramfs copy
    # + exfat data partition. 30 min gives headroom on slower-than-
    # average GHA runners without masking a genuine hang.
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update
          # Base prereqs (initramfs build): busybox-static + cpio.
          # mkusb.sh prereqs (#235 PR2): signed shim/grub from Ubuntu's
          # secure-boot archive + the linux-image-virtual meta-package
          # for the kernel the image boots, plus the filesystem tooling
          # mkusb.sh wires into the ESP + AEGIS_ISOS partitions.
          # Kept identical to mkusb.yml's list so the two environments
          # stay in sync — the release image is expected to boot under
          # the same OVMF SecBoot path that mkusb.yml smoke-tests.
          sudo apt-get install -y --no-install-recommends \
            busybox-static cpio \
            shim-signed grub-efi-amd64-signed linux-image-virtual \
            mtools dosfstools exfatprogs gdisk
          # Kernels ship mode 0600 on Ubuntu; mcopy needs them readable.
          # Conservative chmod across all matching files matches
          # mkusb.yml. Silenced errors for the case where one of the
          # globs doesn't match (e.g. initrd absent on some kernel sets).
          sudo chmod 0644 /boot/vmlinuz-* /boot/initrd.img-* 2>/dev/null || true
          ls -l /boot/vmlinuz-* /boot/initrd.img-*

      - name: Install Rust toolchain (pinned) + musl target
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain 1.88.0 --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" target add x86_64-unknown-linux-musl

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      # ---------- Operator CLI (static musl) -------------------------
      # `aegis-boot` shells out to dd / mount / sudo / sgdisk on the
      # host; static musl just makes the binary itself distro-portable
      # (no glibc version coupling). Operators still need the system
      # tools — `aegis-boot doctor` reports missing prerequisites.
      #
      # aegis-cli is pure-Rust (no C deps) so we don't need musl-gcc /
      # musl-tools — rustc handles the static linking via the rust-std
      # for the musl target. Verified locally: 855 KiB static-pie ELF.
      - name: Build aegis-boot CLI (static musl, x86_64)
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: |
          cargo build --release --locked \
            --target x86_64-unknown-linux-musl \
            -p aegis-bootctl
          mkdir -p out
          cp target/x86_64-unknown-linux-musl/release/aegis-boot \
            out/aegis-boot-x86_64-linux
          file out/aegis-boot-x86_64-linux
          strip out/aegis-boot-x86_64-linux
          du -h out/aegis-boot-x86_64-linux

      # ---------- rescue-tui + initramfs (existing flow) -------------
      - name: Build rescue-tui (release)
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: cargo build --release -p rescue-tui

      - name: Build initramfs
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: ./scripts/build-initramfs.sh

      # ---------- SBOM (existing flow) -------------------------------
      - name: Generate CycloneDX SBOM
        run: |
          cargo install --locked cargo-cyclonedx --version 0.5.7
          # cargo-cyclonedx writes a `<package>.cdx.json` inside each
          # member crate directory rather than a single workspace-wide
          # file. The rescue-tui crate is what we actually ship; its
          # SBOM closure transitively covers iso-probe + kexec-loader +
          # iso-parser since those are compile-time dependencies.
          ( cd crates/rescue-tui && cargo cyclonedx --format json )
          cp crates/rescue-tui/rescue-tui.cdx.json out/sbom.cdx.json

      # ---------- Disk image (#235 PR2) ------------------------------
      # Build the signed-chain disk image as small as we can get away
      # with. The .img contains GPT + ESP (400 MB signed chain: shim
      # + grub + kernel + initrd + grub.cfg — real content ~56 MB,
      # rest is headroom for future kernel growth) + an empty
      # AEGIS_ISOS data partition. ISOs go onto AEGIS_ISOS POST-flash,
      # and `flash` already auto-expands AEGIS_ISOS to fill any-size
      # stick (closes #242) — so shipping a larger empty data
      # partition in the release .img wastes download bandwidth for
      # no operator-visible benefit.
      #
      # DISK_SIZE_MB=512 → AEGIS_ISOS ~108 MB (mkusb.sh floors at
      # ESP_SIZE_MB + 32), total .img ~512 MB — ~4x smaller than
      # the 1900 MB we'd need to stay under GitHub's 2 GiB asset cap
      # (v0.14.0's first tag hit exactly 2 GiB and the upload
      # failed with HTTP 422). Fetch time improves commensurately.
      #
      # AEGIS_ISOS ships empty — the stick is ready to `add` ISOs,
      # not pre-populated; avoids distribution-rights questions
      # around bundling third-party ISOs. Operators who want
      # `init --profile panic-room` run that step post-flash
      # against the catalog.
      - name: Build aegis-boot.img via mkusb.sh
        env:
          SOURCE_DATE_EPOCH: "1700000000"
          DISK_SIZE_MB: "512"
        run: |
          ./scripts/mkusb.sh
          ls -lh out/aegis-boot.img out/aegis-boot.img.sha256
          # Emit the partition table so release logs record the exact
          # shape a verifier can reproduce (GPT, ESP EF00 + AEGIS_ISOS
          # 0700 / exfat).
          sgdisk -p out/aegis-boot.img

      # ---------- Stage + checksum --------------------------------------
      - name: Stage release artifacts + aggregate SHA256SUMS
        run: |
          cp target/release/rescue-tui out/rescue-tui
          # aegis-boot.img sits alongside the other artifacts in
          # SHA256SUMS so a single `cosign verify-blob` on SHA256SUMS
          # transitively pins every asset in the release (#235).
          ( cd out && sha256sum \
              aegis-boot-x86_64-linux \
              rescue-tui \
              initramfs.cpio.gz \
              sbom.cdx.json \
              aegis-boot.img \
              > SHA256SUMS )
          echo "--- Staged artifacts ---"
          ls -lh out/
          echo "--- SHA256SUMS ---"
          cat out/SHA256SUMS

      # ---------- Cosign keyless sign --------------------------------
      # Each artifact gets a .sig (signature) + .pem (certificate)
      # produced via Sigstore keyless signing. Verifiable later with:
      #   cosign verify-blob --certificate-identity-regexp \
      #     "https://github.com/aegis-boot/aegis-boot/" \
      #     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      #     --signature aegis-boot-x86_64-linux.sig \
      #     --certificate aegis-boot-x86_64-linux.pem \
      #     aegis-boot-x86_64-linux
      - name: Cosign sign artifacts (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cd out
          # aegis-boot.img joins the signing loop (#235 PR2). Produces
          # aegis-boot.img.sig + aegis-boot.img.pem alongside the .img,
          # which `aegis-boot fetch-image` auto-discovers via the same-
          # origin convention (<URL>.sig, <URL>.pem).
          for f in aegis-boot-x86_64-linux rescue-tui initramfs.cpio.gz \
                   sbom.cdx.json aegis-boot.img SHA256SUMS; do
            cosign sign-blob --yes \
              --output-signature  "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          echo "--- Signed artifacts ---"
          ls -1 *.sig *.pem

      # ---------- Release notes (existing flow) ----------------------
      - name: Generate release notes
        id: notes
        run: |
          tag="${{ steps.tag.outputs.name }}"
          # Prefer the CHANGELOG entry if present; otherwise synthesize.
          if [ -f CHANGELOG.md ] && grep -q "^## \[${tag#v}\]" CHANGELOG.md; then
            awk -v tag="${tag#v}" '
              BEGIN { inside = 0 }
              /^## \[/ {
                if (inside) exit
                if ($0 ~ "^## \\[" tag "\\]") inside = 1
                else next
              }
              inside { print }
            ' CHANGELOG.md > out/release-notes.md
          else
            echo "Release ${tag}" > out/release-notes.md
          fi
          # Append the verification footer (kept in docs/ to avoid
          # heredoc-vs-YAML indentation hazards in this workflow file).
          # Optional: older tags pre-dating the footer file just skip it.
          if [ -f docs/RELEASE_NOTES_FOOTER.md ]; then
            cat docs/RELEASE_NOTES_FOOTER.md >> out/release-notes.md
          else
            echo "(no docs/RELEASE_NOTES_FOOTER.md at this ref — skipping verification footer)" >&2
          fi
          echo "path=out/release-notes.md" >> "$GITHUB_OUTPUT"

      # ---------- Create release if missing, then upload assets ------
      # Idempotent: works whether the release already exists (manual
      # `gh release create` happened first) or not (tag push triggered
      # this workflow before any human created the release).
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.name }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "aegis-boot $tag" \
              --notes-file "${{ steps.notes.outputs.path }}"
          fi
          # --clobber overwrites if a re-run uploads the same asset name.
          # aegis-boot.img + .sha256 + .sig + .pem added in #235 PR2.
          gh release upload "$tag" --clobber \
            out/aegis-boot-x86_64-linux \
            out/aegis-boot-x86_64-linux.sig \
            out/aegis-boot-x86_64-linux.pem \
            out/rescue-tui \
            out/rescue-tui.sig \
            out/rescue-tui.pem \
            out/initramfs.cpio.gz \
            out/initramfs.cpio.gz.sha256 \
            out/initramfs.cpio.gz.sig \
            out/initramfs.cpio.gz.pem \
            out/sbom.cdx.json \
            out/sbom.cdx.json.sig \
            out/sbom.cdx.json.pem \
            out/aegis-boot.img \
            out/aegis-boot.img.sha256 \
            out/aegis-boot.img.sig \
            out/aegis-boot.img.pem \
            out/SHA256SUMS \
            out/SHA256SUMS.sig \
            out/SHA256SUMS.pem

  # -----------------------------------------------------------------
  # macOS arm64 (Apple Silicon) binary — Phase A1 of epic #365.
  # -----------------------------------------------------------------
  # Ships aarch64-apple-darwin alongside the Linux build so Homebrew
  # and direct-download operators on M1+ Macs can install a native
  # binary rather than cargo-build from source.
  #
  # Phase A1 deliberately does NOT notarize the binary. Notarization
  # (Phase A2 of #365) is gated on the maintainer enrolling in the
  # Apple Developer Program ($99/year) and provisioning a Developer ID
  # Application certificate + notarytool credentials as repo secrets
  # (APPLE_DEV_ID_CERT, APPLE_DEV_ID_CERT_PASSWORD, APPLE_ID,
  # APPLE_TEAM_ID, APPLE_APP_SPECIFIC_PASSWORD). Until Phase A2 lands:
  #
  #   - The binary carries an *ad-hoc* code signature (`codesign -s -`).
  #     This is enough for macOS to execute the binary from a terminal
  #     but does NOT satisfy Gatekeeper's first-launch policy for
  #     quarantined downloads.
  #
  #   - Operators installing via `brew install` (from the tap) will
  #     NOT see a Gatekeeper warning — Homebrew fetches binaries over
  #     HTTPS without setting the com.apple.quarantine extended
  #     attribute, so the first-launch policy never fires.
  #
  #   - Operators who download the raw binary from the GitHub release
  #     UI (or `curl`'d in a way that inherits quarantine) WILL see
  #     "cannot be opened because the developer cannot be verified"
  #     on first launch. Escape hatch: `xattr -d com.apple.quarantine
  #     ./aegis-boot-aarch64-apple-darwin` or Right-Click → Open once.
  #     This is called out in docs/INSTALL.md.
  #
  # Cosign keyless signing (same OIDC flow as the Linux artifact) is
  # still produced. That's independent of Apple notarization and gives
  # operators a verifiable provenance chain from this repo's
  # release.yml identity regardless of the Apple track.
  build-macos-arm64:
    name: Build + sign macOS arm64 binary (aarch64-apple-darwin)
    runs-on: macos-14
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write # cosign keyless signing

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain (pinned)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain 1.88.0 --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          # macos-14 runners are arm64-native, so aarch64-apple-darwin
          # is installed by the rustup bootstrap above. No `rustup target
          # add` needed — verify the host matches our release target.
          "$HOME/.cargo/bin/rustc" -vV | grep '^host: aarch64-apple-darwin$'

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Build aegis-boot CLI (release, aarch64-apple-darwin)
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: |
          cargo build --release --locked \
            --target aarch64-apple-darwin \
            -p aegis-bootctl
          mkdir -p out
          cp target/aarch64-apple-darwin/release/aegis-boot \
            out/aegis-boot-aarch64-apple-darwin
          file out/aegis-boot-aarch64-apple-darwin
          # macOS `strip` is fine with Mach-O binaries; preserves the
          # load commands cosign needs to attest over.
          strip out/aegis-boot-aarch64-apple-darwin
          du -h out/aegis-boot-aarch64-apple-darwin

      - name: Ad-hoc codesign the binary
        # `-s -` is the ad-hoc (identityless) code signature. Enough to
        # satisfy macOS's "must be signed" execution gate for binaries
        # *not* quarantined (e.g. brew-installed); NOT enough for
        # Gatekeeper first-launch on quarantined downloads. That needs
        # a Developer ID identity + notarization, deferred to Phase A2.
        run: |
          codesign -s - --timestamp=none --force \
            out/aegis-boot-aarch64-apple-darwin
          codesign -vv out/aegis-boot-aarch64-apple-darwin

      - name: SHA256 for the macOS binary
        run: |
          ( cd out && shasum -a 256 \
              aegis-boot-aarch64-apple-darwin \
              > aegis-boot-aarch64-apple-darwin.sha256 )
          cat out/aegis-boot-aarch64-apple-darwin.sha256

      - name: Cosign sign (keyless, same OIDC flow as Linux build)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cd out
          cosign sign-blob --yes \
            --output-signature  aegis-boot-aarch64-apple-darwin.sig \
            --output-certificate aegis-boot-aarch64-apple-darwin.pem \
            aegis-boot-aarch64-apple-darwin
          ls -1 aegis-boot-aarch64-apple-darwin*

      - name: Upload macOS assets to the release
        # The Linux job (`build-and-release`) creates the release if it
        # does not yet exist. macOS runs in parallel, so guard against
        # the race by retrying `gh release view` briefly before upload.
        # --clobber overwrites if a re-run uploads the same asset name.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.name }}"
          for i in 1 2 3 4 5 6; do
            if gh release view "$tag" >/dev/null 2>&1; then
              break
            fi
            echo "release $tag not yet visible (attempt $i) — sleeping"
            sleep 10
          done
          if ! gh release view "$tag" >/dev/null 2>&1; then
            # Create it ourselves — the Linux job may still be building
            # the initramfs + mkusb image. Idempotent either way.
            gh release create "$tag" \
              --title "aegis-boot $tag" \
              --notes "Release ${tag}"
          fi
          gh release upload "$tag" --clobber \
            out/aegis-boot-aarch64-apple-darwin \
            out/aegis-boot-aarch64-apple-darwin.sha256 \
            out/aegis-boot-aarch64-apple-darwin.sig \
            out/aegis-boot-aarch64-apple-darwin.pem

  # Bumps Formula/aegis-boot.rb on main when a new tag is pushed. Skipped
  # for workflow_dispatch (which is the manual-backfill path — bumping
  # would risk regressing the formula to an older release).
  bump-brew-formula:
    name: Bump Homebrew formula on main
    needs: build-and-release
    if: github.event_name == 'push'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          # Token with write — the default GITHUB_TOKEN suffices because
          # we set `permissions: contents: write` above.

      - name: Resolve tag
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Wait briefly for release assets to settle
        # gh release upload above can lag a few seconds before the API
        # returns assets via `gh release download`. Tiny sleep avoids
        # the race in practice.
        run: sleep 10

      - name: Download SHA256SUMS from the new release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.name }}"
          gh release download "$tag" --pattern SHA256SUMS --output /tmp/SHA256SUMS
          echo "--- SHA256SUMS ---"
          cat /tmp/SHA256SUMS

      - name: Bump Formula/aegis-boot.rb if needed
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.name }}"
          version="${tag#v}"
          # Extract both platform shas from the release's SHA256SUMS. If
          # one is missing (e.g. the macOS build leg failed mid-release),
          # we warn + skip that block only — don't fail the whole bump,
          # because a partial bump is still useful for the other arch.
          linux_sha=$(grep '  aegis-boot-x86_64-linux$' /tmp/SHA256SUMS | awk '{print $1}')
          macos_sha=$(grep '  aegis-boot-aarch64-apple-darwin$' /tmp/SHA256SUMS | awk '{print $1}')
          echo "new version:    $version"
          echo "linux  sha256:  ${linux_sha:-<missing>}"
          echo "macos  sha256:  ${macos_sha:-<missing>}"

          if [ -z "$linux_sha" ] && [ -z "$macos_sha" ]; then
            echo "neither aegis-boot-x86_64-linux nor aegis-boot-aarch64-apple-darwin in SHA256SUMS — aborting bump" >&2
            exit 1
          fi

          if [ ! -f Formula/aegis-boot.rb ]; then
            echo "Formula/aegis-boot.rb missing — nothing to bump" >&2
            exit 0
          fi

          # Bump version (single line match — unambiguous).
          sed -i "s|^  version \".*\"|  version \"${version}\"|" Formula/aegis-boot.rb

          # Bump the Linux block — scope the edit to lines between
          # `on_linux do` and its matching `end` so we don't clobber the
          # macOS block. Use awk with a small state machine (ranges are
          # trickier in sed for nested blocks + we want an inner-range).
          if [ -n "$linux_sha" ]; then
            awk -v ver="$version" -v sha="$linux_sha" '
              /^  on_linux do$/ { in_block = 1 }
              in_block && /^  end$/ { in_block = 0 }
              in_block && /aegis-boot-x86_64-linux"$/ {
                sub(/\/releases\/download\/v[^/]+\//, "/releases/download/v" ver "/")
              }
              in_block && /^      sha256 "/ {
                sub(/sha256 "[^"]*"/, "sha256 \"" sha "\"")
              }
              { print }
            ' Formula/aegis-boot.rb > Formula/aegis-boot.rb.tmp
            mv Formula/aegis-boot.rb.tmp Formula/aegis-boot.rb
          else
            echo "::warning::macOS arm64 sha present but Linux x86_64 sha missing — Linux block left unchanged"
          fi

          # Bump the macOS block — same scoping trick, different block.
          if [ -n "$macos_sha" ]; then
            awk -v ver="$version" -v sha="$macos_sha" '
              /^  on_macos do$/ { in_block = 1 }
              in_block && /^  end$/ { in_block = 0 }
              in_block && /aegis-boot-aarch64-apple-darwin"$/ {
                sub(/\/releases\/download\/v[^/]+\//, "/releases/download/v" ver "/")
              }
              in_block && /^      sha256 "/ {
                sub(/sha256 "[^"]*"/, "sha256 \"" sha "\"")
              }
              { print }
            ' Formula/aegis-boot.rb > Formula/aegis-boot.rb.tmp
            mv Formula/aegis-boot.rb.tmp Formula/aegis-boot.rb
          else
            echo "::warning::Linux x86_64 sha present but macOS arm64 sha missing — macOS block left unchanged"
          fi

          # Show the diff for the run log.
          echo "--- formula diff ---"
          git --no-pager diff Formula/aegis-boot.rb || true

          if git diff --quiet Formula/aegis-boot.rb; then
            echo "formula already up to date for ${tag} — skipping commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push the bump
        if: steps.bump.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.name }}"
          git config user.name "aegis-boot release bot"
          git config user.email "noreply@github.com"
          git add Formula/aegis-boot.rb
          # Heredoc-built message keeps the multi-line body cleanly
          # indented inside the YAML literal block scalar.
          msg_file=$(mktemp)
          {
            printf 'chore(brew): bump formula to %s\n' "$tag"
            printf '\n'
            printf 'Auto-bump from .github/workflows/release.yml after the %s\n' "$tag"
            printf 'release artifacts were uploaded. SHA-256 sourced from the\n'
            printf "release's signed SHA256SUMS file.\n"
          } > "$msg_file"
          git commit --file="$msg_file"
          git push origin main
