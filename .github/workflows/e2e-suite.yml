name: E2E suite (shared-build)

# #580 Phase 2 — shared-artifact pattern. Produces rescue-tui + the
# aegis-bootctl release binary + initramfs.cpio.gz ONCE in a `build-shared`
# job and feeds them to consumer jobs via `needs:` + download-artifact.
# Phase 2 is COMPLETE: this is the sole owner of the QEMU E2E gates.
#
# Phase history:
#   - 2a (PR #614): canary qemu-smoke-shared, parallel to standalone.
#   - 2b (PR #685): qemu-smoke.yml standalone retired; canary became sole.
#   - 2c (PR #686): kexec-e2e-shared added. Bug fix: install
#     linux-image-virtual in build-shared so initramfs modules match
#     the consumer kernel.
#   - 2d (PR #687): mkusb-shared added.
#   - 2e (PR #688): direct-install-shared added; build-shared extended
#     to also produce aegis-bootctl.
#   - 2f (PR #689): update-rotate-shared added.
#   - 2g (PR #690): ovmf-secboot-shared added.
#   - Retirement (PR #691): kexec-e2e.yml + mkusb.yml + direct-install-e2e.yml
#     + update-rotate-e2e.yml deleted; ovmf-secboot-e2e job removed
#     (foundation stays). Combined savings: ~7.5 CPU min/PR.
#
# RISK NOTE (Architect's condition on consensus_vote 2026-04-25):
# `build-shared` is now a single point of failure for downstream
# consumers. A flaky toolchain install blocks the entire E2E suite.
# Mitigations:
#   - retention-days: 1 (consumer-side artifact rot is bounded)
#   - if `build-shared` fails, downstream jobs skip cleanly via `needs:`
#   - if regression is observed, revert this retirement PR — the
#     standalone workflows can be restored from git history in one
#     atomic commit.

on:
  push:
    branches: [main]
    # Same paths-ignore as kexec-e2e.yml et al — docs-only PRs skip
    # the whole suite (#580 Phase 1).
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE*'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Producer job. Builds the artifacts every consumer needs:
  # rescue-tui release binary + deterministic initramfs.cpio.gz.
  # Uses Swatinem/rust-cache to keep cargo registry + git caches
  # warm across runs (~/.cargo only — NOT target/, to stay well
  # under the 10 GB GHA cache quota with 6 future consumers).
  build-shared:
    name: Build shared artifacts (rescue-tui + initramfs)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install initramfs build dependencies
        # linux-image-virtual provides the 5.15.0-*-generic vmlinuz +
        # /lib/modules/<ver>/ that build-initramfs.sh bakes in. Consumers
        # (kexec-e2e-shared) install the same package on their own
        # runner; modules + kernel must match or modprobe fails inside
        # QEMU and `ip link set lo up` panics PID 1. Without this step
        # build-initramfs.sh falls back to the runner host's
        # 6.8.0-*-azure modules, which don't load on a 5.15-virtual
        # boot.
        #
        # qemu-smoke-shared works around this gap because qemu-smoke.sh
        # doesn't modprobe anything; kexec-e2e.sh DOES (loop / isofs /
        # udf for the fixture-ISO mount path). Adding the kernel here
        # is what makes that consumer green.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            busybox-static cpio \
            linux-image-virtual
          sudo chmod 0644 /boot/vmlinuz-* /boot/initrd.img-* 2>/dev/null || true
          ls -l /boot/vmlinuz-* /boot/initrd.img-*

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show
      - name: rust-cache (registry + git only — see comment)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          # cache-targets: false would skip target/ — but Swatinem
          # already excludes it by default for non-binary crates.
          # Including only the workspace members we actually build
          # in this job keeps the cache tight.
          workspaces: ". -> target"
          # Distinguish the cache from per-workflow caches in other
          # jobs so this job's first build doesn't poison their keys.
          shared-key: e2e-shared-build

      - name: Build rescue-tui + aegis-bootctl (release)
        # aegis-bootctl is required by the direct-install canary
        # (Phase 2e) which runs `aegis-boot flash --direct-install`
        # against a loop image. Building both binaries in one cargo
        # invocation is faster than two separate build steps because
        # cargo's dep graph is computed once.
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: cargo build --release -p rescue-tui -p aegis-bootctl

      - name: Build initramfs (out/initramfs.cpio.gz)
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: ./scripts/build-initramfs.sh

      - name: Stage shared artifacts
        run: |
          # The producer assembles a flat layout for consumers:
          #   shared/rescue-tui              (release binary)
          #   shared/aegis-boot              (aegis-bootctl release binary)
          #   shared/initramfs.cpio.gz       (deterministic image)
          #   shared/initramfs.cpio.gz.sha256 (for integrity check)
          # Consumers reposition into target/release/ and out/ so
          # existing scripts/*.sh keep working unchanged.
          #
          # aegis-bootctl is only consumed by the direct-install canary.
          # Other consumers ignore the file; the upload cost is bounded
          # (binary is ~10 MB).
          mkdir -p shared
          cp target/release/rescue-tui                shared/rescue-tui
          cp target/release/aegis-boot                shared/aegis-boot
          cp out/initramfs.cpio.gz                    shared/initramfs.cpio.gz
          cp out/initramfs.cpio.gz.sha256             shared/initramfs.cpio.gz.sha256
          ls -lh shared/

      - name: Upload shared artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: e2e-shared-build
          path: shared/
          # Consumers fire in the same workflow run; 1 day is more
          # than enough headroom + avoids artifact-storage bloat.
          retention-days: 1
          if-no-files-found: error

  # First consumer. Originally landed in Phase 2a as a canary running
  # parallel to .github/workflows/qemu-smoke.yml; standalone retired in
  # Phase 2b (this is now the sole qemu-smoke gate). The "(shared-build
  # canary)" suffix in the job name is preserved for git history /
  # check-name continuity — branch protection rules referencing it stay
  # working without coordinated re-config.
  qemu-smoke-shared:
    name: Boot initramfs under QEMU (shared-build canary)
    needs: build-shared
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install QEMU + kernel runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            linux-image-generic \
            busybox-static \
            cpio
          # linux-image-generic installs vmlinuz under /boot, typically
          # 0644 on GHA runners. Verify readability up front. Same logic
          # as the standalone qemu-smoke.yml.
          ls -l /boot/vmlinuz-*-generic | tee /tmp/kernels.txt
          KERNEL=$(ls -1 /boot/vmlinuz-*-generic 2>/dev/null | sort | tail -1)
          if [ -z "$KERNEL" ] || [ ! -r "$KERNEL" ]; then
            echo "No readable kernel; attempting chmod"
            sudo chmod 0644 /boot/vmlinuz-*-generic || true
            KERNEL=$(ls -1 /boot/vmlinuz-*-generic 2>/dev/null | sort | tail -1)
          fi
          echo "KERNEL=$KERNEL" >> "$GITHUB_ENV"

      - name: Download shared artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0  # v5
        with:
          name: e2e-shared-build
          path: shared/

      - name: Reposition artifacts to expected paths
        run: |
          # The shared producer staged a flat layout; reposition into
          # target/release/ + out/ so scripts/qemu-smoke.sh + the rest
          # of the toolchain see the artifacts at the same paths the
          # standalone workflows produce inline.
          mkdir -p target/release out
          mv shared/rescue-tui                  target/release/rescue-tui
          mv shared/initramfs.cpio.gz           out/initramfs.cpio.gz
          mv shared/initramfs.cpio.gz.sha256    out/initramfs.cpio.gz.sha256
          chmod +x target/release/rescue-tui
          ls -lh target/release/rescue-tui out/initramfs.cpio.gz

      - name: QEMU smoke boot
        env:
          TIMEOUT_SECONDS: "90"
        run: ./scripts/qemu-smoke.sh

  # Phase 2c canary — kexec-e2e using the shared build artifacts.
  # Runs alongside the standalone .github/workflows/kexec-e2e.yml until
  # 5 PRs of green-parity, then a follow-up PR retires the standalone
  # using the same pattern as Phase 2b (qemu-smoke retirement).
  kexec-e2e-shared:
    name: kexec E2E (shared-build canary)
    needs: build-shared
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install runtime + fixture-build tools
        # Mirror of kexec-e2e.yml's deps, minus the rescue-tui /
        # initramfs build prereqs (busybox-static + cpio for those
        # are still pulled because qemu-kexec-e2e.sh's fixture build
        # uses busybox internally).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            linux-image-virtual \
            busybox-static cpio \
            xorriso util-linux mount
          sudo chmod 0644 /boot/vmlinuz-* /boot/initrd.img-* 2>/dev/null || true
          ls -l /boot/vmlinuz-* /boot/initrd.img-*

      - name: Download shared artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0  # v5
        with:
          name: e2e-shared-build
          path: shared/

      - name: Reposition artifacts to expected paths
        run: |
          mkdir -p target/release out
          mv shared/rescue-tui                  target/release/rescue-tui
          mv shared/initramfs.cpio.gz           out/initramfs.cpio.gz
          mv shared/initramfs.cpio.gz.sha256    out/initramfs.cpio.gz.sha256
          chmod +x target/release/rescue-tui
          ls -lh target/release/rescue-tui out/initramfs.cpio.gz

      - name: Run kexec E2E
        env:
          TIMEOUT_SECONDS: "180"
        run: sudo -E ./scripts/qemu-kexec-e2e.sh

  # Phase 2d canary — mkusb image build + SB-enforcing boot smoke using
  # the shared rescue-tui + initramfs. Runs alongside the standalone
  # .github/workflows/mkusb.yml until 5 PRs of green-parity, then a
  # follow-up PR retires the standalone.
  mkusb-shared:
    name: mkusb — build + boot smoke (shared-build canary)
    needs: build-shared
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install signed boot chain + image tooling
        # Mirror of mkusb.yml's deps minus busybox-static + cpio (the
        # initramfs is consumed pre-built; we don't rebuild it here).
        # linux-image-virtual still needed because mkusb.sh reads
        # /boot/vmlinuz-* + /boot/initrd.img-* to assemble the image.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 ovmf \
            shim-signed grub-efi-amd64-signed linux-image-virtual \
            mtools dosfstools exfatprogs gdisk
          sudo chmod 0644 /boot/vmlinuz-* /boot/initrd.img-* 2>/dev/null || true
          ls -l /boot/vmlinuz-* /boot/initrd.img-*

      - name: Download shared artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0  # v5
        with:
          name: e2e-shared-build
          path: shared/

      - name: Reposition artifacts to expected paths
        run: |
          mkdir -p target/release out
          mv shared/rescue-tui                  target/release/rescue-tui
          mv shared/initramfs.cpio.gz           out/initramfs.cpio.gz
          mv shared/initramfs.cpio.gz.sha256    out/initramfs.cpio.gz.sha256
          chmod +x target/release/rescue-tui
          ls -lh target/release/rescue-tui out/initramfs.cpio.gz

      - name: Run mkusb
        run: |
          DISK_SIZE_MB=1024 MKUSB_GRUB_DEFAULT=1 ./scripts/mkusb.sh
          ls -lh out/aegis-boot.img out/aegis-boot.img.sha256
          sgdisk -p out/aegis-boot.img

      - name: Boot the image under OVMF SecBoot
        env:
          TIMEOUT_SECONDS: "120"
        run: |
          cp /usr/share/OVMF/OVMF_VARS_4M.ms.fd /tmp/vars.fd
          chmod 0644 /tmp/vars.fd
          timeout "$TIMEOUT_SECONDS" qemu-system-x86_64 \
            -nographic \
            -no-reboot \
            -machine q35,smm=on \
            -global driver=cfi.pflash01,property=secure,value=on \
            -m 1024M \
            -drive if=pflash,format=raw,unit=0,file=/usr/share/OVMF/OVMF_CODE_4M.secboot.fd,readonly=on \
            -drive if=pflash,format=raw,unit=1,file=/tmp/vars.fd \
            -drive if=ide,format=raw,file=out/aegis-boot.img \
            -boot order=c \
            -serial mon:stdio </dev/null > /tmp/mkusb-boot.log 2>&1 || true
          echo "--- mkusb QEMU serial output (last 60 lines) ---"
          tail -60 /tmp/mkusb-boot.log
          echo "--- end ---"
          if grep -qiE 'secure boot (is )?enabled|secureboot.*enabled' /tmp/mkusb-boot.log \
             && grep -q 'aegis-boot rescue-tui starting' /tmp/mkusb-boot.log; then
            echo "mkusb image boots cleanly under SB + rescue-tui runs: PASS"
          else
            echo "mkusb boot smoke FAILED"
            exit 1
          fi

  # Phase 2e canary — direct-install end-to-end on the shared rescue-tui
  # + aegis-bootctl + initramfs. Most complex consumer: builds both
  # paths (mkusb + direct-install), diffs ESP byte-parity between them,
  # validates the Stage 7 attestation manifest, then SB-boots the
  # direct-install image. Runs alongside the standalone
  # .github/workflows/direct-install-e2e.yml until 5 PRs of green-parity.
  direct-install-shared:
    name: direct-install — flash + boot smoke + ESP byte-parity (shared-build canary)
    needs: build-shared
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install signed boot chain + image tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 ovmf \
            shim-signed grub-efi-amd64-signed linux-image-virtual \
            mtools dosfstools exfatprogs gdisk \
            util-linux diffutils
          sudo chmod 0644 /boot/vmlinuz-* /boot/initrd.img-* 2>/dev/null || true
          ls -l /boot/vmlinuz-* /boot/initrd.img-*

      - name: Download shared artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0  # v5
        with:
          name: e2e-shared-build
          path: shared/

      - name: Reposition artifacts to expected paths
        run: |
          mkdir -p target/release out
          mv shared/rescue-tui                  target/release/rescue-tui
          mv shared/aegis-boot                  target/release/aegis-boot
          mv shared/initramfs.cpio.gz           out/initramfs.cpio.gz
          mv shared/initramfs.cpio.gz.sha256    out/initramfs.cpio.gz.sha256
          chmod +x target/release/rescue-tui target/release/aegis-boot
          ls -lh target/release/rescue-tui target/release/aegis-boot out/initramfs.cpio.gz

      # ---- Path A: build via direct-install onto a loop device ---------------

      - name: Create blank loop image (direct-install target)
        run: |
          dd if=/dev/zero of=/tmp/direct-install.img bs=1M count=1024 status=none
          sudo losetup --find --partscan --show /tmp/direct-install.img > /tmp/direct-install.loop
          echo "loop device: $(cat /tmp/direct-install.loop)"

      - name: Flash via --direct-install
        env:
          MKUSB_GRUB_DEFAULT: "1"
          AEGIS_ALLOW_LOOP_DEVICE: "1"
        run: |
          LOOP=$(cat /tmp/direct-install.loop)
          sudo -E ./target/release/aegis-boot flash --direct-install --yes \
            --out-dir ./out "$LOOP"
          sudo partprobe "$LOOP"
          ls -l "${LOOP}p1" "${LOOP}p2"

      - name: Capture direct-install ESP file inventory + sha256s
        run: |
          LOOP=$(cat /tmp/direct-install.loop)
          mkdir -p /tmp/esp-direct
          sudo mount -o ro "${LOOP}p1" /tmp/esp-direct
          (cd /tmp/esp-direct && find . -type f \
            ! -name 'aegis-boot-manifest.json' \
            ! -name 'aegis-boot-manifest.json.minisig' | sort) \
            > /tmp/direct-install.files
          (cd /tmp/esp-direct && find . -type f \
            ! -name 'aegis-boot-manifest.json' \
            ! -name 'aegis-boot-manifest.json.minisig' | sort \
            | xargs sha256sum 2>/dev/null) > /tmp/direct-install.sha256
          sudo umount /tmp/esp-direct

      # ---- Path B: build via mkusb.sh for byte-parity comparison ------------

      - name: Build via mkusb.sh
        env:
          MKUSB_GRUB_DEFAULT: "1"
        run: |
          DISK_SIZE_MB=1024 MKUSB_GRUB_DEFAULT=1 ./scripts/mkusb.sh
          ls -lh out/aegis-boot.img

      - name: Capture mkusb.sh ESP file inventory + sha256s
        run: |
          MKUSB_LOOP=$(sudo losetup --find --partscan --show out/aegis-boot.img)
          mkdir -p /tmp/esp-mkusb
          sudo mount -o ro "${MKUSB_LOOP}p1" /tmp/esp-mkusb
          (cd /tmp/esp-mkusb && find . -type f | sort) > /tmp/mkusb.files
          (cd /tmp/esp-mkusb && find . -type f | sort \
            | xargs sha256sum 2>/dev/null) > /tmp/mkusb.sha256
          sudo umount /tmp/esp-mkusb
          sudo losetup -d "$MKUSB_LOOP"

      - name: ESP byte-parity diff
        run: |
          if ! diff -u /tmp/mkusb.files /tmp/direct-install.files; then
            echo "ESP file SET differs"
            exit 1
          fi
          if ! diff -u /tmp/mkusb.sha256 /tmp/direct-install.sha256; then
            echo "ESP file CONTENTS differ"
            exit 1
          fi
          echo "ESP byte-parity: PASS"

      - name: Verify Stage 7 attestation manifest
        run: |
          LOOP=$(cat /tmp/direct-install.loop)
          mkdir -p /tmp/esp-direct-verify
          sudo mount -o ro "${LOOP}p1" /tmp/esp-direct-verify
          if [ ! -f /tmp/esp-direct-verify/aegis-boot-manifest.json ]; then
            echo "MISSING: aegis-boot-manifest.json"
            sudo umount /tmp/esp-direct-verify
            exit 1
          fi
          sudo cp /tmp/esp-direct-verify/aegis-boot-manifest.json /tmp/manifest.json
          python3 <<'PY'
          import json
          m = json.load(open('/tmp/manifest.json'))
          assert m['schema_version'] == 1, m
          assert len(m['esp_files']) == 6, m['esp_files']
          print(f"manifest OK: schema_version={m['schema_version']}, esp_files={len(m['esp_files'])}, manifest_sequence={m['manifest_sequence']}")
          PY
          sudo umount /tmp/esp-direct-verify

      - name: Boot the direct-install image under OVMF SecBoot
        env:
          TIMEOUT_SECONDS: "120"
        run: |
          sudo losetup -d "$(cat /tmp/direct-install.loop)" || true
          cp /usr/share/OVMF/OVMF_VARS_4M.ms.fd /tmp/vars.fd
          chmod 0644 /tmp/vars.fd
          timeout "$TIMEOUT_SECONDS" qemu-system-x86_64 \
            -nographic \
            -no-reboot \
            -machine q35,smm=on \
            -global driver=cfi.pflash01,property=secure,value=on \
            -m 1024M \
            -drive if=pflash,format=raw,unit=0,file=/usr/share/OVMF/OVMF_CODE_4M.secboot.fd,readonly=on \
            -drive if=pflash,format=raw,unit=1,file=/tmp/vars.fd \
            -drive if=ide,format=raw,file=/tmp/direct-install.img \
            -boot order=c \
            -serial mon:stdio </dev/null > /tmp/direct-install-boot.log 2>&1 || true
          echo "--- direct-install QEMU serial output (last 60 lines) ---"
          tail -60 /tmp/direct-install-boot.log
          echo "--- end ---"
          if grep -qiE 'secure boot (is )?enabled|secureboot.*enabled' /tmp/direct-install-boot.log \
             && grep -q 'aegis-boot rescue-tui starting' /tmp/direct-install-boot.log; then
            echo "direct-install boots cleanly under SB + rescue-tui runs: PASS"
          else
            echo "direct-install boot smoke FAILED"
            exit 1
          fi

  # Phase 2f canary — update --rotate end-to-end on shared rescue-tui +
  # aegis-bootctl + initramfs. Tests the post-#444 rotation path:
  # baseline verify → drift injection → update detects → --apply →
  # post-rotation verify clean → doctor reports bumped sequence →
  # SB boot proves signed chain survives.
  #
  # Runs alongside .github/workflows/update-rotate-e2e.yml until
  # 5 PRs of green-parity.
  update-rotate-shared:
    name: update — rotate + verify + boot under SB (shared-build canary)
    needs: build-shared
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install deps (QEMU + OVMF + signed boot chain + tooling)
        # Mirror of update-rotate-e2e.yml's deps. linux-image-virtual
        # still needed: mkusb.sh / direct-install read /boot/vmlinuz-*.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 ovmf \
            shim-signed grub-efi-amd64-signed linux-image-virtual \
            mtools dosfstools exfatprogs gdisk \
            util-linux
          sudo chmod 0644 /boot/vmlinuz-* /boot/initrd.img-* 2>/dev/null || true

      - name: Download shared artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0  # v5
        with:
          name: e2e-shared-build
          path: shared/

      - name: Reposition artifacts to expected paths
        run: |
          mkdir -p target/release out
          mv shared/rescue-tui                  target/release/rescue-tui
          mv shared/aegis-boot                  target/release/aegis-boot
          mv shared/initramfs.cpio.gz           out/initramfs.cpio.gz
          mv shared/initramfs.cpio.gz.sha256    out/initramfs.cpio.gz.sha256
          chmod +x target/release/rescue-tui target/release/aegis-boot

      - name: Create blank loop image + flash via --direct-install
        env:
          MKUSB_GRUB_DEFAULT: "1"
          AEGIS_ALLOW_LOOP_DEVICE: "1"
        run: |
          dd if=/dev/zero of=/tmp/update-rotate.img bs=1M count=1024 status=none
          sudo losetup --find --partscan --show /tmp/update-rotate.img \
            > /tmp/update-rotate.loop
          LOOP=$(cat /tmp/update-rotate.loop)
          sudo -E ./target/release/aegis-boot flash --direct-install --yes \
            --out-dir ./out "$LOOP"
          sudo partprobe "$LOOP"

      - name: "Baseline verify --stick (must be 0 drift)"
        run: |
          LOOP=$(cat /tmp/update-rotate.loop)
          sudo ./target/release/aegis-boot verify --stick "$LOOP" \
            | tee /tmp/verify-baseline.out
          grep -q '0 drift, 0 unreadable' /tmp/verify-baseline.out \
            || { echo "Baseline verify should be clean"; exit 1; }

      - name: Inject drift into /vmlinuz on the ESP
        run: |
          LOOP=$(cat /tmp/update-rotate.loop)
          mkdir -p /tmp/esp-rotate
          sudo mount "${LOOP}p1" /tmp/esp-rotate
          sudo dd if=/dev/urandom of=/tmp/esp-rotate/vmlinuz bs=1 count=16 \
            conv=notrunc status=none
          sudo umount /tmp/esp-rotate
          sudo sync

      - name: "update must report CHANGED on vmlinuz"
        run: |
          LOOP=$(cat /tmp/update-rotate.loop)
          sudo ./target/release/aegis-boot update "$LOOP" \
            | tee /tmp/update-diff.out
          grep -q 'CHANGED */vmlinuz' /tmp/update-diff.out \
            || { echo "update should detect vmlinuz drift"; exit 1; }

      - name: "--apply --experimental-apply must complete + refresh manifest"
        env:
          MKUSB_GRUB_DEFAULT: "1"
          AEGIS_ALLOW_LOOP_DEVICE: "1"
        run: |
          LOOP=$(cat /tmp/update-rotate.loop)
          sudo -E ./target/release/aegis-boot update "$LOOP" \
            --apply --experimental-apply \
            | tee /tmp/update-apply.out
          grep -q 'Rotation complete' /tmp/update-apply.out \
            || { echo "rotation did not report complete"; exit 1; }
          grep -q 'Manifest refreshed' /tmp/update-apply.out \
            || { echo "manifest was not refreshed"; exit 1; }

      - name: "Post-rotation verify --stick (must be 0 drift)"
        run: |
          LOOP=$(cat /tmp/update-rotate.loop)
          sudo ./target/release/aegis-boot verify --stick "$LOOP" \
            | tee /tmp/verify-post.out
          grep -q '0 drift, 0 unreadable' /tmp/verify-post.out \
            || { echo "post-rotation verify should be clean"; exit 1; }

      - name: "Post-rotation doctor --stick surfaces bumped sequence"
        run: |
          LOOP=$(cat /tmp/update-rotate.loop)
          sudo ./target/release/aegis-boot doctor --stick "$LOOP" \
            | tee /tmp/doctor-post.out
          grep -qE 'manifest sequence.*sequence=[0-9]+' /tmp/doctor-post.out \
            || { echo "doctor --stick missing manifest sequence row"; exit 1; }

      - name: Boot the rotated image under OVMF SecBoot
        env:
          TIMEOUT_SECONDS: "120"
        run: |
          sudo losetup -d "$(cat /tmp/update-rotate.loop)" || true
          cp /usr/share/OVMF/OVMF_VARS_4M.ms.fd /tmp/vars.fd
          chmod 0644 /tmp/vars.fd
          timeout "$TIMEOUT_SECONDS" qemu-system-x86_64 \
            -nographic \
            -no-reboot \
            -machine q35,smm=on \
            -global driver=cfi.pflash01,property=secure,value=on \
            -m 1024M \
            -drive if=pflash,format=raw,unit=0,file=/usr/share/OVMF/OVMF_CODE_4M.secboot.fd,readonly=on \
            -drive if=pflash,format=raw,unit=1,file=/tmp/vars.fd \
            -drive if=ide,format=raw,file=/tmp/update-rotate.img \
            -boot order=c \
            -serial mon:stdio </dev/null > /tmp/update-rotate-boot.log 2>&1 || true
          echo "--- QEMU serial output (last 60 lines) ---"
          tail -60 /tmp/update-rotate-boot.log
          echo "--- end ---"
          if grep -qiE 'secure boot (is )?enabled|secureboot.*enabled' /tmp/update-rotate-boot.log \
             && grep -q 'aegis-boot rescue-tui starting' /tmp/update-rotate-boot.log; then
            echo "Rotated image boots under SB + rescue-tui runs: PASS"
          else
            echo "Post-rotation boot smoke FAILED"
            exit 1
          fi

  # Phase 2g canary — OVMF SecBoot E2E on shared rescue-tui +
  # initramfs. Mirrors ovmf-secboot-e2e.yml's `ovmf-secboot-e2e` job
  # (the one that builds rescue-tui + initramfs); the workflow's other
  # job — `ovmf-secboot-foundation` — has no shared deps and stays in
  # the standalone file.
  #
  # Runs alongside .github/workflows/ovmf-secboot.yml until 5 PRs of
  # green-parity, then a follow-up retires the standalone E2E job
  # (foundation stays).
  ovmf-secboot-shared:
    name: OVMF SecBoot E2E (shared-build canary)
    needs: build-shared
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install signed boot chain + tooling
        # Mirror of ovmf-secboot.yml's `ovmf-secboot-e2e` deps minus
        # busybox-static + cpio (initramfs is consumed pre-built).
        # ovmf-secboot-e2e.sh accepts both -generic and -virtual
        # kernels so linux-image-virtual is fine here (consistent with
        # build-shared's choice).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 ovmf \
            shim-signed grub-efi-amd64-signed linux-image-virtual \
            mtools dosfstools exfatprogs gdisk
          sudo chmod 0644 /boot/vmlinuz-* /boot/initrd.img-* 2>/dev/null || true

      - name: Download shared artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0  # v5
        with:
          name: e2e-shared-build
          path: shared/

      - name: Reposition artifacts to expected paths
        run: |
          mkdir -p target/release out
          mv shared/rescue-tui                  target/release/rescue-tui
          mv shared/initramfs.cpio.gz           out/initramfs.cpio.gz
          mv shared/initramfs.cpio.gz.sha256    out/initramfs.cpio.gz.sha256
          chmod +x target/release/rescue-tui
          ls -lh target/release/rescue-tui out/initramfs.cpio.gz

      - name: Run OVMF SecBoot E2E
        env:
          TIMEOUT_SECONDS: "120"
        run: ./scripts/ovmf-secboot-e2e.sh

  # Test-mode dispatcher verification (#698 follow-up).
  # Boots QEMU once per harness test mode (kexec-unsigned, mok-enroll,
  # manifest-roundtrip) with `aegis.test=<NAME>` injected via
  # QEMU_SMOKE_TEST_MODE. Asserts the per-mode start landmark fires —
  # catches dispatcher / landmark drift in aegis-boot's own CI instead
  # of waiting for aegis-hwsim's next sweep.
  #
  # This proves the test mode ENTERS — not the full assertion path
  # (real EKEYREJECTED on kexec, MOK walkthrough text, PCR roundtrip).
  # Those stay in aegis-hwsim's QEMU+OVMF+swtpm harness which boots
  # under enforcing SB + lockdown.
  test-mode-dispatcher-shared:
    name: Test-mode dispatcher smoke (shared-build)
    needs: build-shared
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        mode: [kexec-unsigned, mok-enroll, manifest-roundtrip]

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install QEMU + kernel runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            linux-image-generic \
            busybox-static \
            cpio
          sudo chmod 0644 /boot/vmlinuz-* 2>/dev/null || true

      - name: Download shared artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0  # v5
        with:
          name: e2e-shared-build
          path: shared/

      - name: Reposition artifacts to expected paths
        run: |
          mkdir -p target/release out
          mv shared/rescue-tui                  target/release/rescue-tui
          mv shared/initramfs.cpio.gz           out/initramfs.cpio.gz
          mv shared/initramfs.cpio.gz.sha256    out/initramfs.cpio.gz.sha256
          chmod +x target/release/rescue-tui

      - name: Smoke ${{ matrix.mode }} dispatcher
        env:
          QEMU_SMOKE_TEST_MODE: ${{ matrix.mode }}
          TIMEOUT_SECONDS: "60"
        run: ./scripts/qemu-smoke.sh
