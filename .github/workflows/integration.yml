name: Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Top-level permissions: read-only default. Jobs that need write
# access elevate explicitly. Closes Scorecard TokenPermissionsID.
permissions:
  contents: read

jobs:
  iso-probe-mount:
    name: iso-probe loop-mount integration
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      AEGIS_INTEGRATION_ROOT: "1"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install build + fixture tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xorriso

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show
      - name: Check loop devices are available
        run: |
          # On GHA runners the loop driver is built into the kernel, so
          # `lsmod` won't show it. Check for the control device instead.
          sudo modprobe loop 2>/dev/null || true
          if [ ! -c /dev/loop-control ]; then
            echo "::warning::/dev/loop-control missing; skipping integration test"
            echo "SKIP_INTEGRATION=1" >> "$GITHUB_ENV"
          fi

      - name: Run iso-probe loop-mount integration test
        if: env.SKIP_INTEGRATION != '1'
        run: |
          sudo -E "$HOME/.cargo/bin/cargo" test -p iso-probe --release -- --ignored --nocapture

      - name: Install kernel image for kexec dry-run test
        if: env.SKIP_INTEGRATION != '1'
        run: |
          sudo apt-get install -y --no-install-recommends linux-image-generic
          sudo chmod 0644 /boot/vmlinuz-*-generic || true

      - name: Run kexec-loader dry-run integration test
        if: env.SKIP_INTEGRATION != '1'
        run: |
          sudo -E "$HOME/.cargo/bin/cargo" test -p kexec-loader --release -- --ignored --nocapture
          # Belt-and-suspenders: make sure we don't leave a loaded kexec
          # image staged on the runner after the test completes.
          sudo kexec -u 2>/dev/null || true
