name: Direct-install E2E

on:
  # #580 Phase 1: skip on docs-only PRs. See kexec-e2e.yml for rationale.
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', '.github/ISSUE_TEMPLATE/**', 'LICENSE*']
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', '.github/ISSUE_TEMPLATE/**', 'LICENSE*']
  workflow_dispatch:

# #274 Phase 3 — exercises `aegis-boot flash --direct-install` end-to-end
# against a loop-device image, then boots that image under OVMF SecBoot
# to assert the same chain of trust as the legacy mkusb.sh + dd path.
#
# Two correctness gates here:
#   1. The OVMF SecBoot boot — proves the partition + format + ESP-stage
#      pipeline lands a working signed boot chain on the target.
#   2. Byte-parity ESP diff vs mkusb.sh — proves direct-install produces
#      the same on-disk content as the proven legacy path. This is the
#      contrarian-flagged correctness oracle for swapping installers
#      (per #274 RFC consensus vote).

jobs:
  direct-install-e2e:
    name: direct-install — flash + boot smoke + ESP byte-parity
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install signed boot chain + image tooling
        # Matches mkusb.yml's deps so the byte-parity diff has identical
        # source files for both paths. Adds util-linux for losetup +
        # diffutils for the parity diff (both already in ubuntu-22.04
        # base, listed for clarity).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 ovmf \
            shim-signed grub-efi-amd64-signed linux-image-virtual \
            mtools dosfstools exfatprogs gdisk \
            busybox-static cpio \
            util-linux diffutils
          sudo chmod 0644 /boot/vmlinuz-* /boot/initrd.img-* 2>/dev/null || true
          ls -l /boot/vmlinuz-* /boot/initrd.img-*

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show
      - name: Build aegis-boot CLI + rescue-tui
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: |
          cargo build --release -p aegis-bootctl -p rescue-tui

      - name: Build initramfs (out/initramfs.cpio.gz)
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: ./scripts/build-initramfs.sh

      # ---- Path A: build via direct-install onto a loop device ---------------

      - name: Create blank loop image (direct-install target)
        run: |
          # Match mkusb.yml's image size for parity comparison.
          dd if=/dev/zero of=/tmp/direct-install.img bs=1M count=1024 status=none
          sudo losetup --find --partscan --show /tmp/direct-install.img > /tmp/direct-install.loop
          echo "loop device: $(cat /tmp/direct-install.loop)"

      - name: Flash via --direct-install
        env:
          # MKUSB_GRUB_DEFAULT=1 selects serial-primary in the rendered
          # grub.cfg, matching mkusb.yml so the boot smoke can reuse the
          # same QEMU -nographic/-serial pattern.
          MKUSB_GRUB_DEFAULT: "1"
          # Narrow override — accepts /dev/loopN targets only. Keeps the
          # real-drive safety check intact (a real /dev/sdX would still
          # be rejected even with this var set). CI-only use.
          AEGIS_ALLOW_LOOP_DEVICE: "1"
        run: |
          LOOP=$(cat /tmp/direct-install.loop)
          # --yes skips the typed-confirmation prompt; --out-dir points at
          # the freshly-built initramfs from build-initramfs.sh.
          # `sudo -E` preserves AEGIS_ALLOW_LOOP_DEVICE across the uid
          # boundary — otherwise sudo strips it and the CLI rejects the
          # loop device as "not removable."
          sudo -E ./target/release/aegis-boot flash --direct-install --yes \
            --out-dir ./out "$LOOP"
          # Re-read the partition table so subsequent mounts see partitions.
          sudo partprobe "$LOOP"
          ls -l "${LOOP}p1" "${LOOP}p2"

      - name: Capture direct-install ESP file inventory + sha256s
        run: |
          LOOP=$(cat /tmp/direct-install.loop)
          mkdir -p /tmp/esp-direct
          sudo mount -o ro "${LOOP}p1" /tmp/esp-direct
          # Record the canonical 6-file set + per-file sha256. Exclude
          # the attestation manifest + sidecar sig (#349 Phase 3b
          # Stage 7) — mkusb.sh does not emit them and their per-flash
          # sequence + device identity fields are expected to differ.
          # The byte-parity test's purpose is to prove the SIGNED-CHAIN
          # layer is identical between mkusb.sh and direct-install;
          # the manifest is additive metadata, not part of the chain.
          (cd /tmp/esp-direct && find . -type f \
            ! -name 'aegis-boot-manifest.json' \
            ! -name 'aegis-boot-manifest.json.minisig' | sort) \
            > /tmp/direct-install.files
          (cd /tmp/esp-direct && find . -type f \
            ! -name 'aegis-boot-manifest.json' \
            ! -name 'aegis-boot-manifest.json.minisig' | sort \
            | xargs sha256sum 2>/dev/null) > /tmp/direct-install.sha256
          echo "--- direct-install FULL ESP file set (including manifest) ---"
          (cd /tmp/esp-direct && find . -type f | sort)
          sudo umount /tmp/esp-direct
          echo "--- direct-install ESP file set (excluding manifest, for parity diff) ---"
          cat /tmp/direct-install.files
          echo "--- direct-install ESP sha256s (excluding manifest) ---"
          cat /tmp/direct-install.sha256

      # ---- Path B: build via mkusb.sh for byte-parity comparison ------------

      - name: Build via mkusb.sh
        env:
          MKUSB_GRUB_DEFAULT: "1"
        run: |
          DISK_SIZE_MB=1024 MKUSB_GRUB_DEFAULT=1 ./scripts/mkusb.sh
          ls -lh out/aegis-boot.img

      - name: Capture mkusb.sh ESP file inventory + sha256s
        run: |
          # Map the mkusb image as a loop device with partition scanning,
          # then compare ESP partition 1 contents against direct-install.
          MKUSB_LOOP=$(sudo losetup --find --partscan --show out/aegis-boot.img)
          echo "mkusb loop device: $MKUSB_LOOP"
          mkdir -p /tmp/esp-mkusb
          sudo mount -o ro "${MKUSB_LOOP}p1" /tmp/esp-mkusb
          (cd /tmp/esp-mkusb && find . -type f | sort) > /tmp/mkusb.files
          (cd /tmp/esp-mkusb && find . -type f | sort \
            | xargs sha256sum 2>/dev/null) > /tmp/mkusb.sha256
          sudo umount /tmp/esp-mkusb
          sudo losetup -d "$MKUSB_LOOP"

      - name: ESP byte-parity diff (the contrarian's correctness oracle)
        run: |
          # File-set parity: same 6 canonical signed-chain files in
          # both ESPs (the attestation manifest is excluded upstream —
          # see #349 Phase 3b note on the capture step).
          if ! diff -u /tmp/mkusb.files /tmp/direct-install.files; then
            echo "ESP file SET differs between mkusb.sh and direct-install"
            exit 1
          fi
          # Per-file sha256 parity: each canonical file is byte-identical.
          # If this fails, --direct-install is producing different bytes
          # than mkusb.sh — likely a regression in the partition/stage
          # helpers. Diff makes the offending file(s) explicit.
          if ! diff -u /tmp/mkusb.sha256 /tmp/direct-install.sha256; then
            echo "ESP file CONTENTS differ between mkusb.sh and direct-install"
            exit 1
          fi
          echo "ESP byte-parity: PASS — direct-install produces identical ESP to mkusb.sh"

      - name: Verify #349 Phase 3b manifest was written
        run: |
          # Stage 7 of flash_direct_install writes the attestation
          # manifest (#349 Phase 3b). The byte-parity diff above
          # deliberately excludes it. Assert it exists here so a
          # regression that loses Stage 7 doesn't pass silently.
          LOOP=$(cat /tmp/direct-install.loop)
          mkdir -p /tmp/esp-direct-verify
          sudo mount -o ro "${LOOP}p1" /tmp/esp-direct-verify
          if [ ! -f /tmp/esp-direct-verify/aegis-boot-manifest.json ]; then
            echo "MISSING: /EFI/aegis-boot-manifest.json — Stage 7 did not write the manifest"
            sudo umount /tmp/esp-direct-verify
            exit 1
          fi
          echo "--- aegis-boot-manifest.json (first 400 bytes) ---"
          sudo head -c 400 /tmp/esp-direct-verify/aegis-boot-manifest.json
          echo
          # Manifest body must parse as JSON, carry schema_version=1,
          # and list exactly 6 esp_files (the canonical signed-chain
          # closed set per aegis-wire-formats::Manifest).
          sudo cp /tmp/esp-direct-verify/aegis-boot-manifest.json /tmp/manifest.json
          python3 <<'PY'
          import json
          m = json.load(open('/tmp/manifest.json'))
          assert m['schema_version'] == 1, m
          assert len(m['esp_files']) == 6, m['esp_files']
          print(f"manifest OK: schema_version={m['schema_version']}, esp_files={len(m['esp_files'])}, manifest_sequence={m['manifest_sequence']}")
          PY
          sudo umount /tmp/esp-direct-verify

      # ---- Path A boot smoke: prove direct-install boots ---------------------

      - name: Boot the direct-install image under OVMF SecBoot
        env:
          TIMEOUT_SECONDS: "120"
        run: |
          # Detach from loop so QEMU can take exclusive access to the
          # backing file.
          sudo losetup -d "$(cat /tmp/direct-install.loop)" || true
          cp /usr/share/OVMF/OVMF_VARS_4M.ms.fd /tmp/vars.fd
          chmod 0644 /tmp/vars.fd
          timeout "$TIMEOUT_SECONDS" qemu-system-x86_64 \
            -nographic \
            -no-reboot \
            -machine q35,smm=on \
            -global driver=cfi.pflash01,property=secure,value=on \
            -m 1024M \
            -drive if=pflash,format=raw,unit=0,file=/usr/share/OVMF/OVMF_CODE_4M.secboot.fd,readonly=on \
            -drive if=pflash,format=raw,unit=1,file=/tmp/vars.fd \
            -drive if=ide,format=raw,file=/tmp/direct-install.img \
            -boot order=c \
            -serial mon:stdio </dev/null > /tmp/direct-install-boot.log 2>&1 || true
          echo "--- direct-install QEMU serial output (last 60 lines) ---"
          tail -60 /tmp/direct-install-boot.log
          echo "--- end ---"
          if grep -qiE 'secure boot (is )?enabled|secureboot.*enabled' /tmp/direct-install-boot.log \
             && grep -q 'aegis-boot rescue-tui starting' /tmp/direct-install-boot.log; then
            echo "direct-install image boots under SB + rescue-tui runs: PASS"
          else
            echo "direct-install boot smoke FAILED"
            exit 1
          fi

      - name: Upload direct-install image + boot log
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: direct-install-image
          path: |
            /tmp/direct-install.img
            /tmp/direct-install-boot.log
            /tmp/direct-install.files
            /tmp/direct-install.sha256
            /tmp/mkusb.files
            /tmp/mkusb.sha256
          retention-days: 14
          if-no-files-found: warn
