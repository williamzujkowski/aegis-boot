name: Fuzz (nightly)

on:
  schedule:
    # 07:00 UTC daily = 03:00 ET
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: "Per-target fuzz duration in seconds"
        default: "600"
        required: false

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [validate_path, distribution_from_paths]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install nightly toolchain
        run: |
          rustup toolchain install nightly --profile minimal
          rustup override set nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: "crates/iso-parser/fuzz -> target"
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked --version 0.12.0
      - name: Run fuzz target
        working-directory: crates/iso-parser
        env:
          DURATION: ${{ github.event.inputs.duration_seconds || '600' }}
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=$DURATION
      - name: Upload crashes on failure
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: |
            crates/iso-parser/fuzz/artifacts/**
            crates/iso-parser/fuzz/corpus/**
          retention-days: 30
