name: Reproducible Build Verification

on:
  # #580 Phase 1: skip on docs-only PRs. See kexec-e2e.yml for rationale.
  # reproducible-build does two full builds (~2:13 each), making it the
  # second-biggest CPU hog after the QEMU E2E suite — high-leverage skip.
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', '.github/ISSUE_TEMPLATE/**', 'LICENSE*']
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', '.github/ISSUE_TEMPLATE/**', 'LICENSE*']
  workflow_dispatch:

# Reproducibility is verified at the level we ship — the Rust release binaries
# that go into the initramfs — not at the Docker image layer (whose digest is
# affected by APT/HTTP metadata outside our control) or at .rlib intermediates
# (which embed CARGO_HOME paths in metadata). Two back-to-back builds with the
# same SOURCE_DATE_EPOCH must produce identical sha256(rescue-tui).

# Top-level permissions: read-only default. Jobs that need write
# access elevate explicitly. Closes Scorecard TokenPermissionsID.
permissions:
  contents: read

jobs:
  reproducible-build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Build image
        run: docker build -t aegis-boot:builder -f Dockerfile.locked .

      - name: Build Pass 1
        run: |
          docker run --rm -v "$PWD:/build" -w /build aegis-boot:builder rm -rf target
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e SOURCE_DATE_EPOCH=1700000000 \
            -e CARGO_HOME=/tmp/cargo-repro \
            -v "$PWD:/build" \
            -w /build \
            aegis-boot:builder \
            cargo build --release --workspace
          sha256sum target/release/rescue-tui > pass1.sha256
          cat pass1.sha256

      - name: Build Pass 2
        run: |
          docker run --rm -v "$PWD:/build" -w /build aegis-boot:builder rm -rf target
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e SOURCE_DATE_EPOCH=1700000000 \
            -e CARGO_HOME=/tmp/cargo-repro \
            -v "$PWD:/build" \
            -w /build \
            aegis-boot:builder \
            cargo build --release --workspace
          sha256sum target/release/rescue-tui > pass2.sha256
          cat pass2.sha256

      - name: Compare artifact hashes
        run: |
          p1=$(awk '{print $1}' pass1.sha256)
          p2=$(awk '{print $1}' pass2.sha256)
          if [ "$p1" = "$p2" ]; then
            echo "rescue-tui is reproducible — $p1"
            exit 0
          else
            echo "rescue-tui diverged: $p1 vs $p2"
            exit 1
          fi

      - name: Upload verification artifacts
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: build-hashes
          path: |
            pass1.sha256
            pass2.sha256
          retention-days: 30
