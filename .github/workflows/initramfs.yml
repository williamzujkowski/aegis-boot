name: Initramfs Build

on:
  # #580 Phase 1: skip on docs-only PRs. The reproducible-initramfs
  # build doesn't depend on markdown content (the binary is built from
  # the rescue-tui Rust source); skipping saves ~3 CPU min per docs PR.
  # See kexec-e2e.yml for the rationale + dummy-pass policy.
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', '.github/ISSUE_TEMPLATE/**', 'LICENSE*']
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', '.github/ISSUE_TEMPLATE/**', 'LICENSE*']
  workflow_dispatch:

# Top-level permissions: read-only default. Jobs that need write
# access elevate explicitly. Closes Scorecard TokenPermissionsID.
permissions:
  contents: read

jobs:
  initramfs:
    name: Build + verify reproducible initramfs
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends busybox-static cpio

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show
      - name: Build rescue-tui (release)
        run: cargo build --release -p rescue-tui

      # #616: parallelize the two reproducibility passes in-job rather
      # than sequentially. Wall-clock drops from ~60s to ~30s; CPU-min
      # stays unchanged (still doing 2× the work, just compressed in
      # time). build-initramfs.sh uses `mktemp -d` for STAGE_DIR per
      # invocation and OUT_DIR is already a per-call parameter, so two
      # concurrent runs do not collide on filesystem state. We avoid
      # splitting into separate jobs because each new job pays ~30-45s
      # of setup overhead (apt + Rust install), which would net out to
      # MORE CPU-min, the opposite of #580's goal.
      - name: Build initramfs (passes 1 + 2 in parallel) + verify reproducibility
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: |
          OUT_DIR=out1 ./scripts/build-initramfs.sh &
          PASS1_PID=$!
          OUT_DIR=out2 ./scripts/build-initramfs.sh &
          PASS2_PID=$!
          # Surface each pass's exit status independently so a failed
          # pass-2 doesn't get masked if pass-1 happens to finish first.
          wait "$PASS1_PID" || { echo "pass 1 failed"; exit 1; }
          wait "$PASS2_PID" || { echo "pass 2 failed"; exit 1; }
          p1=$(awk '{print $1}' out1/initramfs.cpio.gz.sha256)
          p2=$(awk '{print $1}' out2/initramfs.cpio.gz.sha256)
          echo "Pass 1: $p1"
          echo "Pass 2: $p2"
          if [ "$p1" = "$p2" ]; then
            echo "initramfs.cpio.gz is reproducible"
          else
            echo "initramfs.cpio.gz diverged between passes"
            exit 1
          fi

      - name: Size budget check
        run: |
          size=$(stat -c '%s' out1/initramfs.cpio.gz)
          echo "initramfs size: $size bytes"
          # 20 MB budget — matches the script's own check.
          if [ "$size" -gt 20971520 ]; then
            echo "size exceeds 20 MB budget"
            exit 1
          fi

      - name: Upload initramfs artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: initramfs
          path: |
            out1/initramfs.cpio.gz
            out1/initramfs.cpio.gz.sha256
          retention-days: 30
