name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test (Rust ${{ matrix.rust }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, "1.95.0"]
    defaults:
      run:
        working-directory: crates/iso-parser
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install toolchain
        run: |
          rustup toolchain install ${{ matrix.rust }} --profile minimal --component rustfmt,clippy
          rustup override set ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: "crates/iso-parser -> target"
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features --locked

  aegis-cli:
    name: aegis-cli (Linux + Windows cross-check)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install Rust toolchain (from rust-toolchain.toml) + cross targets
        run: |
          rustup show
          rustup target add x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - name: Format + lint aegis-cli
        run: |
          cargo fmt --check
          cargo clippy -p aegis-bootctl --all-targets -- -D warnings
      - name: Run aegis-cli tests
        run: cargo test -p aegis-bootctl --locked
      - name: Cross-compile check for Windows
        # Build-only gate. Confirms Windows detect code compiles for
        # x86_64-pc-windows-gnu via MinGW; the PowerShell-output
        # parser is exercised via committed fixtures. Real runtime
        # behavior is covered by `cargo check + test (windows-2022)`.
        run: cargo check -p aegis-bootctl --target x86_64-pc-windows-gnu --all-targets
      # macOS cross-compile from a Linux runner is intentionally NOT
      # attempted: aegis-fetch's transitive `ring` requires a C cross-
      # compile that needs `osxcross` infrastructure. Real macOS
      # validation lives in the dedicated `macOS native smoke
      # (macos-14)` job, which runs the same source on a real macOS
      # runner and catches every portability regression cross-compile
      # would. (#655 PR-C; was blocking on ring's build.rs failing
      # under cc when targeting x86_64-apple-darwin.)

  rescue-tui:
    # rescue-tui isn't part of the workspace-wide `Test` job because
    # that job is scoped to `crates/iso-parser` (see working-directory
    # + workspaces:). Without this dedicated job, rescue-tui's clippy
    # baseline silently drifts between releases. Issue #519.
    name: rescue-tui clippy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - name: Format + lint rescue-tui
        run: |
          cargo fmt --check
          cargo clippy -p rescue-tui --all-targets -- -D warnings
      - name: Run rescue-tui tests
        run: cargo test -p rescue-tui --locked

  macos-smoke:
    # Partial coverage for issue #420. The Linux CI job already runs
    # `cargo check --target x86_64-apple-darwin` against every PR —
    # but that's a cross-compile. This job spins up an actual macos-14
    # runner and does a native build + test, closing the "the
    # cfg-gated macOS subprocess wrappers have never been compiled
    # or linked on real macOS" gap.
    #
    # Does NOT do the full direct-install e2e (partition a USB, flash
    # the signed chain, verify the ESP). That's the remaining open
    # portion of #420 — needs a sparseimage-backed loopback target +
    # OVMF-equivalent boot test, which is meaningfully more work than
    # this smoke gate. Tracked there.
    name: macOS native smoke (macos-14)
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - name: Format + lint aegis-cli on native macOS
        run: |
          cargo fmt --check
          cargo clippy -p aegis-bootctl --all-targets -- -D warnings
      - name: Native build + unit tests
        # Exercises the cfg(target_os = "macos") subprocess wrappers
        # at compile + link time under real libSystem. The tests
        # themselves are pure-fn — no diskutil subprocess runs — so
        # this is compile coverage, not runtime coverage.
        run: |
          cargo build -p aegis-bootctl --locked
          cargo test -p aegis-bootctl --locked
      - name: --direct-install CLI surface reachable
        # Final sanity check: the macos_direct_install path through
        # flash.rs compiles in cfg(target_os = "macos") mode and
        # --help works end-to-end. No destructive action — --help
        # short-circuits before preflight.
        run: |
          ./target/debug/aegis-boot flash --help
          # The parent `flash --help` mentions --direct-install;
          # the macOS-specific dispatcher surfaces its own usage
          # message via MissingDeviceArg when the flag lands with
          # no device. That's exercised here as a pure CLI-surface
          # test (no destructive syscalls — source resolution
          # fails first on the missing ./out directory).
          set +e
          output=$(./target/debug/aegis-boot flash --direct-install 2>&1)
          rc=$?
          echo "$output"
          # Expect exit 2 (usage error) with the diskutil list hint.
          if [ "$rc" -ne 2 ]; then
            echo "expected exit 2 for missing device arg, got $rc" >&2
            exit 1
          fi
          case "$output" in
            *"diskutil list"*) ;;
            *)
              echo "expected guidance pointing at diskutil list" >&2
              exit 1
              ;;
          esac

  fitness:
    name: aegis-fitness audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install Rust
        run: rustup show
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - name: Run fitness audit (threshold 80)
        # Stage 8 of dev-test.sh — repo + scripts + docs hygiene.
        # Threshold lowered from the dev-test default (90) to 80 because
        # this job does not build initramfs artifacts (no QEMU here), so
        # the 3 artifact-presence checks (30 pts total) WARN instead of
        # PASS. The artifact-bearing checks still run end-to-end in
        # dev-test.sh locally and in initramfs.yml. Wired per #53.
        run: cargo run --release -p aegis-fitness -- --threshold 80

  cargo-deny:
    name: cargo-deny (advisories + licenses + bans + sources)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      # Workspace-level policy enforced via deny.toml at the repo root.
      # Gates every PR + push-to-main so a dep-bump that pulls in a GPL /
      # AGPL / LGPL / unknown-license crate fails CI before merge.
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb  # v2
        with:
          command: check advisories licenses bans sources

  sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install Rust
        run: rustup show
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked --version 0.5.7
      - name: Generate SBOM
        working-directory: crates/iso-parser
        run: cargo cyclonedx --format json
      - name: Upload SBOM
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        with:
          name: sbom-cyclonedx
          path: crates/iso-parser/**/*.cdx.json
          retention-days: 90
          if-no-files-found: error

  secrets:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  sast:
    name: SAST (semgrep p/rust)
    runs-on: ubuntu-22.04
    container:
      # Pinned per #253. Latest release known-good as of 2026-04-19; refresh
      # this pin when a newer semgrep drops the pkg_resources import (the
      # setuptools 81+ removal leaves `latest` exposed to a sudden break).
      image: returntocorp/semgrep:1.160.0
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - run: semgrep scan --config=p/rust --config=p/security-audit --error --sarif --output semgrep.sarif .
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 30

  nix-smoke:
    name: Nix flake smoke-build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b  # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix flake check --no-build
      - run: nix develop --command cargo --version
      # Build the operator CLI derivation so the `packages` output
      # stays buildable on every PR. NixOS users install via:
      #   nix run github:aegis-boot/aegis-boot -- flash /dev/sdX
      # Drift in cargoLock or runtime-dep list surfaces here.
      - run: nix build .#aegis-bootctl --print-build-logs
      - run: nix run .# -- --version

  # Doc version drift-check (Phase 1c of #287 / #286).
  # Reads [workspace.package].version from Cargo.toml and verifies
  # every aegis-boot-version reference in the user-facing doc
  # allowlist matches. Prevents the v0.14.0 class of bug where a
  # release cut shipped 4 docs still saying v0.13.0.
  doc-version-drift:
    name: Doc version drift-check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - run: ./scripts/check-doc-version.sh

  # Shared-constants drift-check (Phase 2 of #288 / #286).
  # Runs the `constants-docgen` binary in --check mode. Fails if
  # running `--write` would change any target doc. Prevents docs
  # from drifting out of sync with numeric values they reference
  # (ESP_SIZE_MB, readback window, manifest size cap, grub timeout).
  constants-drift:
    name: Doc constants drift-check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install Rust
        run: rustup show
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo run -p aegis-bootctl --bin constants-docgen --features docgen --locked -- --check

  # Trust-anchors drift-check (ADR 0002 / #421 follow-up).
  # Fails the PR if the committed epoch-history table in
  # docs/architecture/KEY_MANAGEMENT.md doesn't match what
  # `keys/historical-anchors.json` + `keys/canonical-epoch.json`
  # render. Any key rotation MUST also bump the doc in the same PR.
  trust-anchors-drift:
    name: Doc trust-anchors drift-check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install Rust
        run: rustup show
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo run -p aegis-bootctl --bin trust-anchors-docgen --features docgen --locked -- --check

  # CLI subcommand + synopsis drift-check (Phase 3a + 3b of #289 / #286).
  # Phase 3a: validates every dispatch-table subcommand has a
  # `## `aegis-boot X`` heading in docs/CLI.md and a `.TP` entry in
  # man/aegis-boot.1.in.
  # Phase 3b: additionally rebuilds docs/reference/CLI_SYNOPSIS.md by
  # capturing `aegis-boot <sub> --help` for every subcommand and
  # diffing against the committed copy. Catches help-text drift that
  # would otherwise silently diverge from the CLI's actual output.
  cli-drift:
    name: Doc CLI subcommand drift-check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install Rust
        run: rustup show
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - name: Build aegis-boot binary
        run: cargo build -p aegis-bootctl --release --locked
      - name: Check CLI doc drift
        run: cargo run -p aegis-bootctl --bin cli-docgen --features docgen --locked -- --check

  # Attestation-manifest JSON schema drift-check (Phase 4a of #290 / #286).
  # Runs `aegis-wire-formats-schema-docgen --check` which regenerates the
  # JSON Schema for `aegis_wire_formats::Manifest` via schemars and diffs
  # it against the committed copy at
  # `docs/reference/schemas/aegis-boot-manifest.schema.json`. A field
  # added, removed, or retyped on any manifest struct breaks this
  # check until the schema is regenerated and committed.
  manifest-schema-drift:
    name: Manifest JSON schema drift-check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install Rust
        run: rustup show
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo run -p aegis-wire-formats --features schema --bin aegis-wire-formats-schema-docgen --locked -- --check

  # rescue-tui trust-tier + keybinding drift-check (Phase 7 of #455 / #462).
  # Regenerates the trust-tier table and keybinding reference in
  # docs/HOW_IT_WORKS.md, docs/TOUR.md, and crates/rescue-tui/README.md
  # from the canonical in-code sources (TrustVerdict enum +
  # KEYBINDINGS registry). Fails if any table has drifted — the fix
  # is to run `cargo run -p rescue-tui --bin tiers-docgen` locally
  # and commit the result.
  tiers-drift:
    name: Doc trust-tier + keybinding drift-check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install Rust
        run: rustup show
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - run: cargo run -p rescue-tui --bin tiers-docgen --locked -- --check
