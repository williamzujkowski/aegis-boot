name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test (Rust ${{ matrix.rust }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, "1.85.0"]
    defaults:
      run:
        working-directory: crates/iso-parser
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: |
          rustup toolchain install ${{ matrix.rust }} --profile minimal --component rustfmt,clippy
          rustup override set ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/iso-parser -> target"
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features --locked

  aegis-cli:
    name: aegis-cli (Linux + macOS + Windows cross-check)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt,clippy
          rustup override set 1.85.0
          rustup target add x86_64-apple-darwin
          rustup target add x86_64-pc-windows-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Format + lint aegis-cli
        run: |
          cargo fmt --check
          cargo clippy -p aegis-cli --all-targets -- -D warnings
      - name: Run aegis-cli tests
        run: cargo test -p aegis-cli --locked
      - name: Cross-compile check for macOS
        # Build-only gate. Confirms cross-platform flash code compiles
        # for x86_64-apple-darwin; runtime macOS behavior is covered
        # by fixture-based parser tests.
        run: cargo check -p aegis-cli --target x86_64-apple-darwin --all-targets
      - name: Cross-compile check for Windows
        # Same rationale as macOS: Windows detect code compiles, its
        # PowerShell-output parser is exercised via committed fixtures.
        run: cargo check -p aegis-cli --target x86_64-pc-windows-gnu --all-targets

  fitness:
    name: aegis-fitness audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: rustup toolchain install 1.85.0 --profile minimal && rustup override set 1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: Run fitness audit (threshold 80)
        # Stage 8 of dev-test.sh — repo + scripts + docs hygiene.
        # Threshold lowered from the dev-test default (90) to 80 because
        # this job does not build initramfs artifacts (no QEMU here), so
        # the 3 artifact-presence checks (30 pts total) WARN instead of
        # PASS. The artifact-bearing checks still run end-to-end in
        # dev-test.sh locally and in initramfs.yml. Wired per #53.
        run: cargo run --release -p aegis-fitness -- --threshold 80

  cargo-deny:
    name: cargo-deny (advisories + licenses + bans)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: crates/iso-parser/Cargo.toml
          command: check

  sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: rustup toolchain install 1.85.0 --profile minimal && rustup override set 1.85.0
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked --version 0.5.7
      - name: Generate SBOM
        working-directory: crates/iso-parser
        run: cargo cyclonedx --format json
      - name: Upload SBOM
        uses: actions/upload-artifact@v5
        with:
          name: sbom-cyclonedx
          path: crates/iso-parser/**/*.cdx.json
          retention-days: 90
          if-no-files-found: error

  secrets:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  sast:
    name: SAST (semgrep p/rust)
    runs-on: ubuntu-22.04
    container:
      # Pinned per #253. Latest release known-good as of 2026-04-19; refresh
      # this pin when a newer semgrep drops the pkg_resources import (the
      # setuptools 81+ removal leaves `latest` exposed to a sudden break).
      image: returntocorp/semgrep:1.160.0
    steps:
      - uses: actions/checkout@v5
      - run: semgrep scan --config=p/rust --config=p/security-audit --error --sarif --output semgrep.sarif .
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 30

  nix-smoke:
    name: Nix flake smoke-build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix flake check --no-build
      - run: nix develop --command cargo --version

  # Doc version drift-check (Phase 1c of #287 / #286).
  # Reads [workspace.package].version from Cargo.toml and verifies
  # every aegis-boot-version reference in the user-facing doc
  # allowlist matches. Prevents the v0.14.0 class of bug where a
  # release cut shipped 4 docs still saying v0.13.0.
  doc-version-drift:
    name: Doc version drift-check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - run: ./scripts/check-doc-version.sh

  # Shared-constants drift-check (Phase 2 of #288 / #286).
  # Runs the `constants-docgen` binary in --check mode. Fails if
  # running `--write` would change any target doc. Prevents docs
  # from drifting out of sync with numeric values they reference
  # (ESP_SIZE_MB, readback window, manifest size cap, grub timeout).
  constants-drift:
    name: Doc constants drift-check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: rustup toolchain install 1.85.0 --profile minimal && rustup override set 1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p aegis-cli --bin constants-docgen --features docgen --locked -- --check

  # CLI subcommand + synopsis drift-check (Phase 3a + 3b of #289 / #286).
  # Phase 3a: validates every dispatch-table subcommand has a
  # `## `aegis-boot X`` heading in docs/CLI.md and a `.TP` entry in
  # man/aegis-boot.1.in.
  # Phase 3b: additionally rebuilds docs/reference/CLI_SYNOPSIS.md by
  # capturing `aegis-boot <sub> --help` for every subcommand and
  # diffing against the committed copy. Catches help-text drift that
  # would otherwise silently diverge from the CLI's actual output.
  cli-drift:
    name: Doc CLI subcommand drift-check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: rustup toolchain install 1.85.0 --profile minimal && rustup override set 1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: Build aegis-boot binary
        run: cargo build -p aegis-cli --release --locked
      - name: Check CLI doc drift
        run: cargo run -p aegis-cli --bin cli-docgen --features docgen --locked -- --check

  # Attestation-manifest JSON schema drift-check (Phase 4a of #290 / #286).
  # Runs `aegis-manifest-schema-docgen --check` which regenerates the
  # JSON Schema for `aegis_manifest::Manifest` via schemars and diffs
  # it against the committed copy at
  # `docs/reference/schemas/aegis-boot-manifest.schema.json`. A field
  # added, removed, or retyped on any manifest struct breaks this
  # check until the schema is regenerated and committed.
  manifest-schema-drift:
    name: Manifest JSON schema drift-check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        run: rustup toolchain install 1.85.0 --profile minimal && rustup override set 1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p aegis-manifest --features schema --bin aegis-manifest-schema-docgen --locked -- --check
