name: Catalog refresh (auto-PR on drift)

# #646 phase 4: weekly + on-demand check whether the catalog's
# pinned URLs still match what the upstream distros publish. If a
# resolver detects drift (e.g. Ubuntu 24.04.4 has shipped where we
# pin 24.04.2), this workflow rewrites the catalog source and opens
# a PR with the diff. Maintainer just merges the bot's PR.
#
# The GPG signature on each project's SHA256SUMS file is the actual
# trust anchor — resolvers only update the URL we tell operators to
# download from. A malicious resolver result would be detected at
# fetch time when the SHA256SUMS GPG signature failed to validate
# against the project's known release-signing key.

on:
  schedule:
    # Monday 06:00 UTC weekly. Cheap (one curl + one PR per week)
    # and catches most distro release cadences.
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Top-level permissions: read-only by default, with the bot job
# below explicitly elevating to contents:write + pull-requests:write
# to commit the catalog mutation + open the auto-PR. Closes the
# Scorecard TokenPermissionsID finding for this workflow (#655 PR-B).
permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    # Job-level permissions narrowed to exactly what the auto-PR
    # path needs: write the rewritten catalog source + open the PR.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Build aegis-boot CLI
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: cargo build --release -p aegis-bootctl --bin aegis-boot

      - name: Run resolver refresh
        id: refresh
        run: |
          set +e
          ./target/release/aegis-boot recommend --refresh --write \
            > /tmp/refresh.log 2>&1
          rc=$?
          set -e
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          cat /tmp/refresh.log
          # rc legend (per catalog::run_refresh):
          #   0 = no drift (or no resolvers configured)
          #   1 = drift detected (catalog mutated)
          #   2 = at least one resolver errored
          if [ "$rc" = "2" ]; then
            echo "::warning::A resolver errored; PR will still open if any drift was detected"
          fi

      - name: Detect mutated catalog
        id: diff
        run: |
          if git diff --quiet -- crates/aegis-catalog-data/src/lib.rs; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "--- diff ---"
            git diff -- crates/aegis-catalog-data/src/lib.rs
          fi

      - name: Run catalog tests against mutated source
        if: steps.diff.outputs.drift == 'true'
        run: "cargo test -p aegis-bootctl --bin aegis-boot catalog::"

      - name: Open / update auto-PR
        if: steps.diff.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="bot/catalog-refresh-$(date -u +%Y-%m-%d)"
          git config user.name "aegis-boot bot"
          git config user.email "noreply@anthropic.com"
          # Capture the diff before the commit so we can embed it in
          # the PR body. Single quotes around the heredoc disable
          # shell expansion inside the body template, so we
          # interpolate the diff via $(cat /tmp/diff) instead.
          git diff -- crates/aegis-catalog-data/src/lib.rs > /tmp/refresh-diff.patch
          git checkout -b "$BRANCH"
          git add crates/aegis-catalog-data/src/lib.rs
          git commit -m 'chore(catalog): auto-refresh resolved URLs (#646)' \
            -m 'Generated by .github/workflows/catalog-refresh.yml: aegis-boot recommend --refresh --write detected upstream drift and rewrote the static URL fields. The signed SHA256SUMS at the new URLs remains the trust anchor on aegis-boot fetch.'
          git push -u origin "$BRANCH"
          {
            echo "The weekly catalog-refresh workflow detected drift between the"
            echo "pinned URLs in \`crates/aegis-catalog-data/src/lib.rs\` and what the"
            echo "upstream distros currently publish. This PR is the auto-rewrite."
            echo
            echo '## What changed'
            echo
            echo '```diff'
            cat /tmp/refresh-diff.patch
            echo '```'
            echo
            echo '## Trust model'
            echo
            echo "Resolvers don't verify ISO contents — they only update the URL"
            echo "that \`aegis-boot fetch\` will eventually GET. The signed"
            echo "\`SHA256SUMS\` at the new URL remains the actual trust anchor;"
            echo "a malicious resolver result would surface as a GPG-signature"
            echo "failure at fetch time against the project's known release-"
            echo "signing key."
            echo
            echo '## Auto-merge?'
            echo
            echo "No — maintainer reviews the diff and merges manually. CI on"
            echo "this PR runs \`scripts/catalog-revalidate.sh\` against the new"
            echo "URLs to confirm they return 2xx before merge."
          } > /tmp/refresh-pr-body.md
          gh pr create \
            --title "chore(catalog): weekly auto-refresh — resolver-detected drift" \
            --body-file /tmp/refresh-pr-body.md
