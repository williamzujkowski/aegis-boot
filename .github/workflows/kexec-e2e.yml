name: kexec E2E

on:
  # #580 Phase 1: skip on docs-only PRs. The 6 E2E workflows (kexec,
  # ovmf-secboot, direct-install, mkusb, qemu-smoke, update-rotate) plus
  # reproducible-build share this paths-ignore block. Markdown / docs /
  # issue templates / LICENSE cannot break a QEMU boot flow, so burning
  # ~5 CPU-min on each was pure waste (PR #572 burned ~25 CPU-min on a
  # docs-only architecture-umbrella change). Branch protection on `main`
  # is currently empty (see docs/governance/CI_REQUIRED_CHECKS.md), so
  # plain paths-ignore is safe — no dummy-pass consolidation needed.
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE*'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'LICENSE*'
  workflow_dispatch:

# Proves the rescue-tui -> target-kernel kexec handoff works end-to-end.
# Complements the OVMF SecBoot E2E (which proves signed-chain -> rescue-tui).

# Top-level permissions: read-only default. Jobs that need write
# access elevate explicitly. Closes Scorecard TokenPermissionsID.
permissions:
  contents: read

jobs:
  kexec-e2e:
    name: kexec E2E (rescue-tui -> target kernel)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install runtime + fixture-build tools
        run: |
          sudo apt-get update
          # linux-image-virtual is ~40 MB vs -generic's ~600 MB pull via
          # linux-firmware. util-linux gives us real losetup behavior
          # in case busybox's loop-mode falls through.
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            linux-image-virtual \
            busybox-static cpio \
            xorriso util-linux mount
          sudo chmod 0644 /boot/vmlinuz-* /boot/initrd.img-* 2>/dev/null || true
          ls -l /boot/vmlinuz-* /boot/initrd.img-*

      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show
      - name: Build rescue-tui (release)
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: cargo build --release -p rescue-tui

      - name: Build base initramfs
        env:
          SOURCE_DATE_EPOCH: "1700000000"
        run: ./scripts/build-initramfs.sh

      - name: Run kexec E2E
        env:
          TIMEOUT_SECONDS: "180"
        run: sudo -E ./scripts/qemu-kexec-e2e.sh
