# git-cliff config for aegis-boot release-note drafts.
#
# Phase 7 of #286. Intended as a drafting assist, NOT full
# auto-generation: `scripts/draft-release-notes.sh` produces a
# first-cut changelog entry from conventional commits which the
# maintainer then curates into the final CHANGELOG.md entry.
#
# Keep a Changelog 1.1.0 shape:
#   ### Added / Changed / Deprecated / Removed / Fixed / Security
# plus an "Other" bucket for anything un-classified so the
# maintainer catches stragglers.
#
# Pinned versioning: update the cargo-install pin in the draft
# script if you bump the minimum git-cliff version here.

[changelog]
# Rendered once per run; groups the filtered commits into sections.
header = """
<!--
  git-cliff draft — generated by scripts/draft-release-notes.sh

  THIS IS A DRAFT. Before promoting to the real CHANGELOG.md:
    * re-word generated bullets into the prose style aegis-boot uses
      (see existing versioned entries — commits include the "what",
      CHANGELOG needs the "why" + user-visible impact)
    * drop commits that are scaffold-only (empty PRs, reverted work)
    * promote critical bug fixes out of their section into the lead

  Phase 7 of https://github.com/williamzujkowski/aegis-boot/issues/286
-->

"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first | trim }}\
    {% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/williamzujkowski/aegis-boot/pull/{{ commit.remote.pr_number }})){% endif %}
{%- endfor %}
{% endfor %}
"""
trim = true
footer = ""

# Optional GitHub enrichment. Without `GITHUB_TOKEN` the run still
# succeeds — `commit.remote.pr_number` will simply be empty and the
# per-bullet PR link disappears. With a token, PR numbers are
# back-linked. The token is not passed to git-cliff from CI (we
# don't want to burn rate-limit budget on every unreleased render);
# set `GITHUB_TOKEN` locally when running the draft script.
[remote.github]
owner = "williamzujkowski"
repo = "aegis-boot"

[git]
# Pull commit parsers in order; the first match wins. `.message`
# matches the subject line; `group` is the Keep-a-Changelog bucket
# name rendered in the body template.
conventional_commits = true
filter_unconventional = false
split_commits = false

# Strip the trailing `(#NNN)` squash-merge tag from commit subjects.
# The PR number is reattached via `commit.remote.pr_number` in the
# template, so without this preprocessor every bullet ends with
# `…message (#283) ([#283](link))`. After stripping, only the
# linked form remains.
#
# Semantic trailers like `(closes #282)` are preserved — they're
# not at end-of-line once the squash-merge tag is removed, and the
# operator cares about which issue was closed.
commit_preprocessors = [
    # Strip the trailing squash-merge `(#NNN)` from the subject line.
    # The preprocessor sees the full commit message (subject + body),
    # so use `(?m)` multi-line mode + `$` to anchor at end-of-line.
    # Match ONLY the first line (subject) by requiring it to be
    # followed by newline or end-of-string.
    # The PR link is re-attached in the body template via
    # `commit.remote.pr_number`, which git-cliff populates via
    # GitHub API or via subject-line parsing as a fallback.
    { pattern = '(?m) \(#[0-9]+\)$', replace = "" },
]

# Drop merge commits — they duplicate the feature bullets.
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Changed" },
    { message = "^refactor", group = "Changed" },
    { message = "^docs", group = "Documentation" },
    { message = "^style", group = "Other" },
    { message = "^test", group = "Other" },
    { message = "^ci", group = "CI + tooling" },
    { message = "^chore\\(deps\\)", group = "Dependency updates" },
    { message = "^chore\\(release\\)", skip = true },          # the "cut vX.Y.Z" bump commit
    { message = "^chore\\(brew\\)", skip = true },             # homebrew-tap formula bumps
    { message = "^chore", group = "Other" },
    { message = "^build", group = "CI + tooling" },
    { message = "^revert", group = "Reverted" },
    { message = "^security", group = "Security" },

    # Belt: anything still unclassified becomes "Other" rather than
    # being silently dropped — the maintainer sees it and decides.
    { message = ".*", group = "Other" },
]

# Tag filter: the script invokes git-cliff with `--tag` so this
# mostly just controls retrospective renders.
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
filter_commits = false
topo_order = false
sort_commits = "oldest"

# Regex parsers for extracting extra metadata from commit bodies.
# aegis-boot uses `(closes #N)` / `(#N)` in PR-merge subject lines;
# git-cliff picks those up natively via the GitHub integration above.
